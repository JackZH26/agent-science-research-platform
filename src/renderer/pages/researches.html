<!-- H4: Demo mode banner -->
<div id="demo-banner" style="background:#e8f4fd;border:1px solid #b8daff;border-radius:8px;padding:8px 16px;margin-bottom:14px;font-size:13px;color:#004085;display:flex;align-items:center;gap:8px">
  <span>ℹ️</span>
  <span><strong>Standalone Mode</strong> — Connect to OpenClaw for live data.</span>
</div>

<div class="page-header">
  <div>
    <h1>Researches</h1>
    <p>Register, track, and manage ASRP researches</p>
  </div>
  <div class="actions">
    <button class="btn btn-primary btn-sm" onclick="showRegisterModal()">+ New Research</button>
  </div>
</div>

<!-- Filter + Sort Bar -->
<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
  <div style="display:flex;gap:6px;flex-wrap:wrap">
    <button class="exp-filter active" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="exp-filter" data-filter="registered" onclick="setFilter('registered')">Registered</button>
    <button class="exp-filter" data-filter="running" onclick="setFilter('running')">Running</button>
    <button class="exp-filter" data-filter="confirmed" onclick="setFilter('confirmed')">Confirmed</button>
    <button class="exp-filter" data-filter="refuted" onclick="setFilter('refuted')">Refuted</button>
    <button class="exp-filter" data-filter="archived" onclick="setFilter('archived')">Archived</button>
  </div>
  <select id="sort-select" style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg-secondary);color:var(--text);margin-left:auto" onchange="applyFilters()">
    <option value="date-desc">Newest first</option>
    <option value="date-asc">Oldest first</option>
    <option value="status">Status</option>
  </select>
  <div style="display:flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:6px;padding:4px 8px;background:var(--bg-secondary)">
    <span style="font-size:12px">🔍</span>
    <input type="text" id="exp-search" placeholder="Search..." style="border:none;outline:none;background:transparent;font-size:12px;color:var(--text);width:160px" oninput="applyFilters()">
  </div>
</div>

<!-- Researches List View -->
<div id="exp-list-view">
  <div id="exp-cards" class="grid-2">
    <div class="loading" style="grid-column:span 2;text-align:center;padding:40px"><div class="spinner"></div> Loading...</div>
  </div>
</div>

<!-- Research Detail View -->
<div id="exp-detail-view" style="display:none">
  <button class="btn btn-ghost btn-sm" style="margin-bottom:14px" onclick="backToExpList()">← Back to Researches</button>
  <div id="exp-detail-content"></div>
</div>

<!-- Register / Edit Modal -->
<div id="register-modal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.45);align-items:center;justify-content:center">
  <div class="panel" style="width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:0">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <h3 style="margin:0" id="modal-title">🧪 New Research</h3>
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
    </div>
    <div style="padding:20px">
      <div class="alert" id="reg-alert"></div>
      <!-- Read-only date shown only in edit mode -->
      <div class="form-group" id="reg-date-row" style="display:none">
        <label>Registered Date</label>
        <input type="text" id="reg-date" disabled style="background:var(--bg-tertiary,#f0f0f0);color:var(--text-secondary);cursor:not-allowed">
      </div>
      <div class="form-group">
        <label>Research Title <span style="color:var(--error)">*</span></label>
        <input type="text" id="reg-title" placeholder="e.g. 300K Superconductor Study">
      </div>
      <div class="form-group">
        <label>Abstract <span style="color:var(--error)">*</span></label>
        <textarea id="reg-abstract" rows="4" placeholder="Describe the research objectives, methods, and expected outcomes..." style="resize:vertical" oninput="autoGenerateTags()"></textarea>
      </div>
      <div class="form-group">
        <label>Tags</label>
        <div id="reg-tags-container" style="display:flex;flex-wrap:wrap;gap:6px;padding:8px;border:1px solid var(--border);border-radius:8px;min-height:38px;background:var(--bg-secondary);cursor:text" onclick="document.getElementById('reg-tag-input').focus()">
          <input type="text" id="reg-tag-input" placeholder="Type and press Enter to add..."
            style="border:none;outline:none;background:transparent;font-size:12px;color:var(--text);flex:1;min-width:120px;padding:2px 0"
            onkeydown="handleTagKeydown(event)">
        </div>
        <div style="font-size:11px;color:var(--text-tertiary);margin-top:4px">Auto-generated from abstract. Click × to remove, type to add custom tags.</div>
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-primary" id="modal-submit-btn" onclick="submitModal()">Register</button>
        <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<style>
.exp-filter {
  padding:4px 12px;border-radius:12px;font-size:12px;border:1px solid var(--border);background:var(--bg-secondary);cursor:pointer;color:var(--text-secondary);transition:all 0.15s
}
.exp-filter.active { background:var(--accent);color:#fff;border-color:var(--accent) }
.exp-card { position:relative }
.exp-status-badge {
  padding:3px 9px;border-radius:10px;font-size:11px;font-weight:600;display:inline-block
}
.exp-status-badge.registered { background:#e2e8f0;color:#475569 }
.exp-status-badge.running { background:#fef3c7;color:#92400e }
.exp-status-badge.confirmed { background:#d1fae5;color:#065f46 }
.exp-status-badge.refuted { background:#fee2e2;color:#991b1b }
.exp-status-badge.archived { background:#f3e8ff;color:#7c3aed }
.exp-score-bar { height:6px;border-radius:3px;background:var(--border);overflow:hidden }
.exp-score-fill { height:100%;border-radius:3px;background:var(--accent);transition:width 0.4s }
.research-tag {
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 8px;border-radius:10px;font-size:11px;
  background:rgba(74,140,106,0.1);color:var(--accent);
  border:1px solid rgba(74,140,106,0.2);
  white-space:nowrap;
}
.research-tag .tag-remove {
  cursor:pointer;font-size:13px;line-height:1;opacity:0.6;margin-left:2px;
}
.research-tag .tag-remove:hover { opacity:1; }
.detail-action-btn {
  padding:6px 14px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;
  border:1px solid var(--border);background:var(--bg-secondary);color:var(--text);
  transition:all 0.15s;display:inline-flex;align-items:center;gap:5px;
}
.detail-action-btn:hover { background:var(--bg-tertiary,#e8e8e8); }
.detail-action-btn.archive { color:#7c3aed;border-color:#d8b4fe; }
.detail-action-btn.archive:hover { background:#f3e8ff; }
</style>

<script>
(function() {
  let allResearches = [];
  let activeStatusFilter = 'all';
  let currentRegTags = [];
  let editingId = null; // null = register mode, string = edit mode

  // ---- Tag auto-generation from abstract ----
  const TAG_KEYWORDS = {
    'DFT': ['dft','density functional','density-functional'],
    'quantum': ['quantum','qubit','entanglement','superposition'],
    'superconductor': ['superconductor','superconducting','超导'],
    'simulation': ['simulation','simulate','numerical','computational'],
    'experiment': ['experiment','experimental','measurement'],
    'machine-learning': ['machine learning','ml','neural network','deep learning','AI'],
    'optimization': ['optimization','optimize','minimization'],
    'materials': ['material','lattice','crystal','alloy','polymer'],
    'theoretical': ['theoretical','theory','analytic','analytical','hypothesis'],
    'spectroscopy': ['spectroscopy','spectrum','spectra','absorption'],
    'molecular': ['molecular','molecule','chemical','chemistry'],
    'electron': ['electron','electronic','band structure','fermi'],
    'photon': ['photon','photonic','optical','laser','light'],
    'thermodynamics': ['thermodynamic','entropy','temperature','heat'],
    'condensed-matter': ['condensed matter','solid state','condensate'],
    'membrane': ['membrane','boundary','surface','interface'],
    'resonance': ['resonance','resonant','oscillat'],
    'magnetic': ['magnetic','magnetism','spin','ferromagnet'],
    'wave': ['wave','waveguide','phonon','vibration'],
    'high-pressure': ['high pressure','GPa','diamond anvil','压力'],
    'room-temperature': ['room temperature','300K','常温','高温'],
  };

  function extractTags(text) {
    if (!text || text.length < 5) return [];
    const lower = text.toLowerCase();
    const tags = [];
    for (const [tag, keywords] of Object.entries(TAG_KEYWORDS)) {
      for (const kw of keywords) {
        if (lower.includes(kw)) { tags.push(tag); break; }
      }
    }
    return tags.slice(0, 6);
  }

  window.autoGenerateTags = function() {
    const text = document.getElementById('reg-abstract').value;
    const autoTags = extractTags(text);
    const customTags = currentRegTags.filter(t => !Object.keys(TAG_KEYWORDS).includes(t));
    currentRegTags = [...new Set([...autoTags, ...customTags])];
    renderRegTags();
  };

  function renderRegTags() {
    const container = document.getElementById('reg-tags-container');
    const input = document.getElementById('reg-tag-input');
    container.querySelectorAll('.research-tag').forEach(el => el.remove());
    currentRegTags.forEach(tag => {
      const el = document.createElement('span');
      el.className = 'research-tag';
      el.innerHTML = escHtml(tag) + ' <span class="tag-remove" onclick="removeRegTag(\'' + escAttr(tag) + '\')">×</span>';
      container.insertBefore(el, input);
    });
  }

  window.removeRegTag = function(tag) {
    currentRegTags = currentRegTags.filter(t => t !== tag);
    renderRegTags();
  };

  window.handleTagKeydown = function(e) {
    if (e.key === 'Enter' || e.key === ',') {
      e.preventDefault();
      const val = e.target.value.trim().replace(/,$/,'').trim();
      if (val && !currentRegTags.includes(val)) {
        currentRegTags.push(val);
        renderRegTags();
      }
      e.target.value = '';
    }
    if (e.key === 'Backspace' && !e.target.value && currentRegTags.length > 0) {
      currentRegTags.pop();
      renderRegTags();
    }
  };

  // Demo mock data
  const MOCK_EXPERIMENTS = [
    {
      id: 'EXP-2026-04-02-003', title: 'Multi-well DD Correction', status: 'running', created: '2026-04-02', score: null, result: null,
      abstract: 'Investigate whether multi-well density-driven (DD) correction with exact Kohn-Sham gap at inter-well spacings d=5,6,7 Bohr can restore DFT binding accuracy to below 0.01%. Uses iDEA reverse-KS code with tight tolerance (1e-6) and chemical potential mu=3.0.',
      tags: ['DFT','simulation','theoretical','electron'],
    },
    {
      id: 'EXP-2026-04-01-002', title: 'Prime-spaced DD Sign Flip', status: 'refuted', created: '2026-04-01', score: 0.1,
      result: 'All DD values remained positive (0.08-0.21 Hartree). Sign flip not observed.',
      abstract: 'Test whether prime-spaced wells (d=2,3,5,7,11 Bohr) produce a negative DD correction (sign flip) in the iDEA 1D model.',
      tags: ['DFT','theoretical','simulation'],
    },
    {
      id: 'EXP-2026-04-01-001', title: 'LDA Overbinding Test', status: 'confirmed', created: '2026-04-01', score: 0.95,
      result: 'LDA binding energy = 2.907 Hartree, exact = 2.904 Hartree. Relative error = 0.103%.',
      abstract: 'Quantify the overbinding error of the Local Density Approximation (LDA) for a 2-electron atom by comparing LDA vs exact iDEA solver binding energies.',
      tags: ['DFT','electron','theoretical'],
    },
    {
      id: 'EXP-2026-03-31-005', title: 'Electron Membrane Nodal Pattern', status: 'confirmed', created: '2026-03-31', score: 0.88,
      result: 'RMSE = 3.2% across 4-ring dataset. Model consistent with observation.',
      abstract: 'Validate the electron membrane model by comparing predicted nodal ring patterns with Stodolna et al. (2013) hydrogen atom photoionization imaging data.',
      tags: ['membrane','electron','spectroscopy','experiment'],
    },
    {
      id: 'EXP-2026-04-02-004', title: 'Fibonacci Lattice DFT Grid', status: 'registered', created: '2026-04-02', score: null, result: null,
      abstract: 'Compare the condition number of DFT overlap matrices using Fibonacci lattice grids vs uniform grids for N>100 basis functions.',
      tags: ['DFT','optimization','materials','simulation'],
    },
  ];

  function statusColor(s) {
    return { registered: '#64748b', running: '#d97706', confirmed: '#059669', refuted: '#dc2626', archived: '#7c3aed' }[s] || '#888';
  }

  function renderCards(list) {
    const container = document.getElementById('exp-cards');
    if (!list.length) {
      container.innerHTML = '<div class="empty-state" style="grid-column:span 2"><span class="icon">🧪</span><h3>No researches found</h3><p>Try changing the filter or register a new research</p></div>';
      return;
    }
    container.innerHTML = list.map(e => {
      const scoreBar = e.score !== null ? `<div style="margin-top:10px"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary);margin-bottom:3px"><span>Score</span><span>${(e.score * 100).toFixed(0)}%</span></div><div class="exp-score-bar"><div class="exp-score-fill" style="width:${(e.score*100).toFixed(0)}%;background:${e.score>0.5?'var(--success)':'var(--error)'}"></div></div></div>` : '';
      const abs = (e.abstract||'').length > 120 ? (e.abstract||'').slice(0,120) + '...' : (e.abstract||'');
      const tagsHtml = (e.tags||[]).slice(0,4).map(t => `<span class="research-tag">${escHtml(t)}</span>`).join('');
      return `<div class="card exp-card" style="cursor:pointer;border-left:3px solid ${statusColor(e.status)}${e.status==='archived'?';opacity:0.7':''}" onclick="openExpDetail('${e.id}')">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:6px">
          <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary)">${e.id}</span>
          <span class="exp-status-badge ${e.status}">${capitalize(e.status)}</span>
        </div>
        <div style="font-weight:600;font-size:14px;color:var(--text);margin-bottom:6px">${escHtml(e.title||e.id)}</div>
        <p style="font-size:12px;color:var(--text-secondary);line-height:1.5;margin-bottom:8px">${escHtml(abs)}</p>
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">${tagsHtml}</div>
        <div style="font-size:11px;color:var(--text-tertiary)">📅 ${e.created}</div>
        ${scoreBar}
      </div>`;
    }).join('');
  }

  window.applyFilters = function() {
    const sort = document.getElementById('sort-select').value;
    const search = document.getElementById('exp-search').value.toLowerCase();

    let filtered = allResearches.filter(e => {
      // "all" filter hides archived; only show archived when explicitly filtering
      if (activeStatusFilter === 'all' && e.status === 'archived') return false;
      if (activeStatusFilter !== 'all' && e.status !== activeStatusFilter) return false;
      if (search) {
        const haystack = [e.title, e.abstract, e.id, ...(e.tags||[])].join(' ').toLowerCase();
        if (!haystack.includes(search)) return false;
      }
      return true;
    });

    filtered = filtered.sort((a, b) => {
      if (sort === 'date-asc') return a.created.localeCompare(b.created);
      if (sort === 'status') return a.status.localeCompare(b.status);
      return b.created.localeCompare(a.created);
    });

    renderCards(filtered);
  };

  window.setFilter = function(f) {
    activeStatusFilter = f;
    document.querySelectorAll('.exp-filter').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-filter="${f}"]`)?.classList.add('active');
    applyFilters();
  };

  // ---- Detail View ----
  window.openExpDetail = function(id) {
    const e = allResearches.find(x => x.id === id);
    if (!e) return;
    document.getElementById('exp-list-view').style.display = 'none';
    document.getElementById('exp-detail-view').style.display = 'block';

    const scoreDisplay = e.score !== null ? `
      <div style="margin-top:16px">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-bottom:4px"><span>Confidence Score</span><span style="font-weight:700;color:${e.score>0.5?'var(--success)':'var(--error)'}">${(e.score*100).toFixed(0)}%</span></div>
        <div class="exp-score-bar" style="height:10px"><div class="exp-score-fill" style="width:${(e.score*100).toFixed(0)}%;background:${e.score>0.5?'var(--success)':'var(--error)'}"></div></div>
      </div>` : '';

    const tagsHtml = (e.tags||[]).map(t => `<span class="research-tag">${escHtml(t)}</span>`).join('');

    const isArchived = e.status === 'archived';

    document.getElementById('exp-detail-content').innerHTML = `
      <div class="panel" style="margin-bottom:12px">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px">
          <div style="flex:1">
            <div style="font-family:var(--font-mono);font-size:12px;color:var(--text-tertiary);margin-bottom:4px">${e.id} · ${e.created}</div>
            <h2 style="font-size:18px;font-weight:700;line-height:1.4;color:var(--text);margin-bottom:0">${escHtml(e.title||e.id)}</h2>
          </div>
          <span class="exp-status-badge ${e.status}" style="flex-shrink:0">${capitalize(e.status)}</span>
        </div>
        ${tagsHtml ? `<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">${tagsHtml}</div>` : ''}
        <div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;margin-bottom:6px">Abstract</div>
        <div style="font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap">${escHtml(e.abstract||'No abstract provided.')}</div>
        ${scoreDisplay}
      </div>
      ${e.result ? `<div class="panel" style="margin-bottom:12px">
        <div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;margin-bottom:8px">Result</div>
        <div style="font-size:13px;line-height:1.6;color:var(--text)">${escHtml(e.result)}</div>
      </div>` : ''}
      <div style="display:flex;gap:8px;margin-top:4px">
        <button class="detail-action-btn" onclick="openEditModal('${e.id}')">✏️ Edit</button>
        ${isArchived
          ? `<button class="detail-action-btn" onclick="unarchiveResearch('${e.id}')">📤 Restore</button>`
          : `<button class="detail-action-btn archive" onclick="archiveResearch('${e.id}')">📦 Archive</button>`
        }
      </div>`;
  };

  window.backToExpList = function() {
    document.getElementById('exp-detail-view').style.display = 'none';
    document.getElementById('exp-list-view').style.display = 'block';
  };

  // ---- Archive / Restore ----
  window.archiveResearch = async function(id) {
    const e = allResearches.find(x => x.id === id);
    if (!e) return;
    e.status = 'archived';
    if (window.asrp) {
      await window.asrp.experiments.update(id, { status: 'archived' });
    }
    backToExpList();
    applyFilters();
  };

  window.unarchiveResearch = async function(id) {
    const e = allResearches.find(x => x.id === id);
    if (!e) return;
    e.status = 'registered';
    if (window.asrp) {
      await window.asrp.experiments.update(id, { status: 'registered' });
    }
    // Re-open detail to refresh buttons
    openExpDetail(id);
  };

  // ---- Modal (Register + Edit) ----
  function resetModal() {
    document.getElementById('reg-title').value = '';
    document.getElementById('reg-abstract').value = '';
    document.getElementById('reg-tag-input').value = '';
    document.getElementById('reg-date').value = '';
    document.getElementById('reg-date-row').style.display = 'none';
    currentRegTags = [];
    renderRegTags();
    document.getElementById('reg-alert').className = 'alert';
  }

  window.showRegisterModal = function() {
    editingId = null;
    resetModal();
    document.getElementById('modal-title').textContent = '🧪 New Research';
    document.getElementById('modal-submit-btn').textContent = 'Register';
    document.getElementById('register-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('reg-title').focus(), 50);
  };

  window.openEditModal = function(id) {
    const e = allResearches.find(x => x.id === id);
    if (!e) return;
    editingId = id;
    resetModal();
    document.getElementById('modal-title').textContent = '✏️ Edit Research';
    document.getElementById('modal-submit-btn').textContent = 'Save Changes';
    document.getElementById('reg-date-row').style.display = 'block';
    document.getElementById('reg-date').value = e.created;
    document.getElementById('reg-title').value = e.title || '';
    document.getElementById('reg-abstract').value = e.abstract || '';
    currentRegTags = [...(e.tags || [])];
    renderRegTags();
    document.getElementById('register-modal').style.display = 'flex';
    setTimeout(() => document.getElementById('reg-title').focus(), 50);
  };

  window.closeModal = function() {
    document.getElementById('register-modal').style.display = 'none';
    editingId = null;
  };

  window.submitModal = async function() {
    if (editingId) {
      await submitEdit();
    } else {
      await submitRegistration();
    }
  };

  async function submitRegistration() {
    const title = document.getElementById('reg-title').value.trim();
    const abstract = document.getElementById('reg-abstract').value.trim();
    const alertEl = document.getElementById('reg-alert');
    if (!title) { alertEl.textContent = 'Title is required'; alertEl.className = 'alert error show'; return; }
    if (!abstract) { alertEl.textContent = 'Abstract is required'; alertEl.className = 'alert error show'; return; }

    const tags = [...currentRegTags];
    const metadata = { title, abstract, tags };

    if (window.asrp) {
      const result = await window.asrp.experiments.register(title, metadata);
      if (result.success) {
        // Create Discord channel named after the research title
        try {
          if (window.asrp.discord && window.asrp.discord.createChannel) {
            const chResult = await window.asrp.discord.createChannel(title);
            if (chResult.success) {
              console.log('Discord channel created:', chResult.channelName);
            } else {
              console.warn('Discord channel creation failed:', chResult.error);
            }
          }
        } catch (chErr) {
          console.warn('Discord channel creation error:', chErr);
        }
        alertEl.textContent = 'Research registered!';
        alertEl.className = 'alert success show';
        allResearches.unshift({
          id: result.id, title, abstract, tags,
          status: 'registered',
          created: new Date().toISOString().slice(0,10),
          score: null, result: null,
        });
        setTimeout(() => { closeModal(); applyFilters(); }, 800);
      }
    }
  }

  async function submitEdit() {
    const title = document.getElementById('reg-title').value.trim();
    const abstract = document.getElementById('reg-abstract').value.trim();
    const alertEl = document.getElementById('reg-alert');
    if (!title) { alertEl.textContent = 'Title is required'; alertEl.className = 'alert error show'; return; }
    if (!abstract) { alertEl.textContent = 'Abstract is required'; alertEl.className = 'alert error show'; return; }

    const tags = [...currentRegTags];

    if (window.asrp) {
      const res = await window.asrp.experiments.update(editingId, { title, abstract, tags });
      if (res.success) {
        // Update local data
        const e = allResearches.find(x => x.id === editingId);
        if (e) { e.title = title; e.abstract = abstract; e.tags = tags; }
        alertEl.textContent = 'Saved!';
        alertEl.className = 'alert success show';
        setTimeout(() => {
          closeModal();
          applyFilters();
          // Refresh detail view if it was open
          openExpDetail(editingId);
        }, 600);
      }
    }
  }

  function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function escAttr(s) { return escHtml(s).replace(/'/g,'&#39;').replace(/"/g,'&quot;'); }
  function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

  async function init() {
    if (!window.asrp) { allResearches = MOCK_EXPERIMENTS; applyFilters(); return; }
    try {
      const { experiments } = await window.asrp.experiments.list();
      allResearches = experiments.map(e => {
        const mock = MOCK_EXPERIMENTS.find(m => m.id === e.id);
        return {
          title: '', abstract: '', tags: [], score: null, result: null,
          ...(mock || {}),
          ...e,
        };
      });
      if (allResearches.length === 0) allResearches = MOCK_EXPERIMENTS;
    } catch (err) {
      console.warn('Failed to load researches:', err);
      allResearches = MOCK_EXPERIMENTS;
    }
    applyFilters();
  }

  init();
})();
</script>
