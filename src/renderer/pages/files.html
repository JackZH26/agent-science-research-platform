<div class="page-header">
  <div>
    <h1 data-i18n="files.title">Files</h1>
    <p data-i18n="files.subtitle">Browse, edit, and search workspace files</p>
  </div>
  <div class="actions">
    <button class="btn btn-primary btn-sm" onclick="addFile()" data-i18n="files.add_file">+ Add File</button>
    <button class="btn btn-outline btn-sm" onclick="openInExplorer()" data-i18n="files.open_finder">Open in Finder</button>
  </div>
</div>

<!-- Search Bar -->
<div class="panel mb-2" style="padding:10px 14px">
  <div style="display:flex;gap:8px;align-items:center">
    <span style="display:flex;align-items:center;color:var(--text-tertiary)"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></span>
    <input type="text" id="file-search-input" data-i18n-placeholder="files.search_placeholder" placeholder="Search file names and content..." style="flex:1;border:none;outline:none;background:transparent;font-size:13px;color:var(--text)" oninput="onSearchInput(this.value)" />
    <button class="btn btn-ghost btn-sm" id="search-clear-btn" style="display:none" onclick="clearSearch()">×</button>
  </div>
</div>

<!-- File Type Filter -->
<div style="display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap">
  <button class="file-filter-btn active" data-ext="all" onclick="setFileFilter('all')" data-i18n="files.filter_all">All</button>
  <button class="file-filter-btn" data-ext=".tex" onclick="setFileFilter('.tex')">.tex</button>
  <button class="file-filter-btn" data-ext=".py" onclick="setFileFilter('.py')">.py</button>
  <button class="file-filter-btn" data-ext=".md" onclick="setFileFilter('.md')">.md</button>
  <button class="file-filter-btn" data-ext=".json" onclick="setFileFilter('.json')">.json</button>
  <button class="file-filter-btn" data-ext=".pdf" onclick="setFileFilter('.pdf')">.pdf</button>
</div>

<!-- Main Layout: Tree + Preview -->
<div style="display:flex;gap:12px;min-height:520px">

  <!-- Left: Directory Tree -->
  <div class="panel" style="width:280px;min-width:220px;overflow-y:auto;padding:0">
    <div style="padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:12px;font-weight:600;color:var(--text-secondary)" data-i18n="files.workspace">WORKSPACE</span>
      <button class="btn btn-ghost btn-sm" style="padding:2px 6px" onclick="refreshTree()" title="Refresh"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg></button>
    </div>
    <div id="file-tree" style="padding:6px 0">
      <div class="loading" style="padding:20px;justify-content:center"><div class="spinner"></div></div>
    </div>
  </div>

  <!-- Right: Preview / Edit -->
  <div class="panel" style="flex:1;min-width:0;padding:0;display:flex;flex-direction:column">
    <div id="preview-header" style="padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;min-height:44px">
      <span id="preview-filename" style="font-size:13px;font-weight:600;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" data-i18n="files.select_file">Select a file to preview</span>
      <div id="preview-actions" style="display:none;gap:6px;display:none">
        <button class="btn btn-outline btn-sm" id="edit-toggle-btn" onclick="toggleEditMode()" data-i18n="common.edit">Edit</button>
        <button class="btn btn-primary btn-sm" id="save-btn" style="display:none" onclick="saveFile()" data-i18n="common.save">Save</button>
        <button class="btn btn-ghost btn-sm" onclick="downloadFile()" title="Download"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg></button>
      </div>
    </div>
    <div id="preview-body" style="flex:1;overflow:auto;padding:0">
      <div id="preview-empty" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-tertiary)">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:12px;opacity:0.3"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        <p style="font-size:13px" data-i18n="files.select_from_tree">Select a file from the tree</p>
      </div>
      <div id="preview-content" style="display:none"></div>
      <div id="edit-content" style="display:none;height:100%">
        <textarea id="edit-textarea" style="width:100%;height:100%;min-height:400px;box-sizing:border-box;border:none;outline:none;resize:none;padding:14px;font-family:var(--font-mono);font-size:12px;line-height:1.7;background:var(--bg-secondary);color:var(--text)" oninput="markUnsaved()"></textarea>
      </div>
      <div id="pdf-preview" style="display:none;height:100%;min-height:400px">
        <iframe id="pdf-iframe" style="width:100%;height:100%;min-height:400px;border:none" title="PDF Preview"></iframe>
        <div id="pdf-fallback" style="display:none;padding:24px;text-align:center">
          <p style="color:var(--text-secondary);margin-bottom:12px" data-i18n="files.cannot_embed_pdf">Cannot embed PDF in this view.</p>
          <button class="btn btn-outline btn-sm" onclick="openCurrentInExplorer()" data-i18n="files.open_system_viewer">Open in System Viewer</button>
        </div>
      </div>
    </div>
    <div id="unsaved-banner" style="display:none;padding:8px 14px;background:var(--warning-bg,#fff8e1);border-top:1px solid var(--warning);font-size:12px;color:var(--text-secondary)">
      <span data-i18n="files.unsaved">Unsaved changes — click Save to persist</span>
    </div>
  </div>
</div>

<!-- Add File Confirmation Modal -->
<div id="addfile-modal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.4);align-items:center;justify-content:center">
  <div class="panel" style="width:460px;max-width:95vw;padding:0">
    <div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <h3 style="margin:0" data-i18n="files.add_file_modal">Add File</h3>
      <button class="btn btn-ghost btn-sm" onclick="closeAddFileModal()">×</button>
    </div>
    <div style="padding:18px">
      <div style="font-size:13px;color:var(--text-secondary);margin-bottom:12px">
        <span data-i18n="files.file_label">File:</span> <strong id="addfile-source-name"></strong>
      </div>
      <div class="form-group">
        <label data-i18n="files.destination">Destination Folder</label>
        <select id="addfile-dest-select" style="width:100%;padding:8px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--bg-secondary);color:var(--text)">
        </select>
      </div>
      <div style="font-size:12px;color:var(--text-tertiary);margin-top:4px" id="addfile-dest-path"></div>
      <div style="display:flex;gap:8px;margin-top:16px">
        <button class="btn btn-primary" onclick="confirmAddFile()" data-i18n="files.copy_to_folder">Copy to Folder</button>
        <button class="btn btn-outline" onclick="closeAddFileModal()" data-i18n="common.cancel">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- Search Results -->
<div id="search-results-panel" style="display:none" class="panel mt-2">
  <div style="padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text-secondary)" id="search-results-label" data-i18n="files.search_results">Search Results</div>
  <div id="search-results-list" style="max-height:400px;overflow-y:auto"></div>
</div>

<style>
.file-filter-btn {
  padding:4px 10px;border-radius:12px;font-size:12px;border:1px solid var(--border);background:var(--bg-secondary);cursor:pointer;color:var(--text-secondary);transition:all 0.15s
}
.file-filter-btn.active,.file-filter-btn:hover {
  background:var(--accent);color:#fff;border-color:var(--accent)
}
.tree-node { user-select:none }
.tree-row {
  display:flex;align-items:center;padding:4px 8px;cursor:pointer;border-radius:4px;font-size:13px;gap:6px;min-height:28px
}
.tree-row:hover { background:var(--hover-bg,rgba(0,0,0,0.04)) }
.tree-row.selected { background:var(--accent-subtle,rgba(74,140,106,0.12));color:var(--accent) }
.tree-row.folder-selected { background:var(--accent-subtle,rgba(74,140,106,0.15));color:var(--accent);font-weight:600;border-right:3px solid var(--accent) }
.tree-toggle { font-size:10px;width:14px;text-align:center;color:var(--text-tertiary);flex-shrink:0;display:flex;align-items:center;justify-content:center }
.tree-icon { flex-shrink:0;display:flex;align-items:center;color:var(--text-tertiary) }
.tree-name { flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap }
.git-badge { font-size:10px;padding:1px 4px;border-radius:3px;margin-left:auto;font-weight:600;flex-shrink:0 }
.git-badge.M { background:#fff3cd;color:#856404 }
.git-badge.A { background:#d4edda;color:#155724 }
.git-badge.ques { background:#f8d7da;color:#721c24 }
.code-block { font-family:var(--font-mono);font-size:12px;line-height:1.7;white-space:pre;overflow-x:auto }
.line-num { display:inline-block;width:36px;text-align:right;padding-right:12px;color:var(--text-tertiary);user-select:none;font-size:11px }
.syn-keyword { color:var(--accent) }
.syn-string { color:var(--success,#2a7a4b) }
.syn-comment { color:var(--text-tertiary);font-style:italic }
.syn-number { color:var(--orange,#e06c00) }
.syn-json-key { color:#7c4dff }
.syn-tex-cmd { color:var(--accent) }
.syn-md-header { font-weight:700 }
.syn-md-code { background:var(--bg-secondary);border-radius:3px;font-family:var(--font-mono) }
.search-result-row { padding:8px 14px;border-bottom:1px solid var(--border);cursor:pointer }
.search-result-row:hover { background:var(--hover-bg,rgba(0,0,0,0.04)) }
.search-result-file { font-weight:600;font-size:13px;color:var(--text) }
.search-result-line { font-size:12px;color:var(--text-secondary);font-family:var(--font-mono);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap }
</style>

<script>
(function() {
  // SVG icons
  var IC = {
    folderClosed: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>',
    folderOpen: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 19a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4l2 3h9a2 2 0 0 1 2 2v1"/><path d="M5 19h14.5a1.5 1.5 0 0 0 1.45-1.12l2-7A1.5 1.5 0 0 0 21.5 9H8.05a1.5 1.5 0 0 0-1.45 1.12L4 19"/></svg>',
    file: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
    fileTex: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="13" y2="17"/></svg>',
    filePy: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M10 12l-2 4"/><path d="M14 12l2 4"/></svg>',
    filePdf: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#c0392b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
    chevronRight: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>',
    chevronDown: '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>',
  };

  function escHtml(s) {
    return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  var workspacePath = '';
  var currentFilePath = '';
  var currentFileName = '';
  var editMode = false;
  var unsaved = false;
  var activeFilter = 'all';
  var searchTimeout = null;
  var addFileSrcPath = '';
  var allDirPaths = []; // for addFile destination picker
  var selectedFolderPath = ''; // currently selected/open folder in tree

  // Folders excluded from the Add File destination dropdown
  var EXCLUDED_DIRS = ['system', 'code'];

  function fileIcon(name) {
    if (!name) return IC.file;
    var ext = name.split('.').pop().toLowerCase();
    if (ext === 'tex') return IC.fileTex;
    if (ext === 'py' || ext === 'js' || ext === 'ts' || ext === 'sh') return IC.filePy;
    if (ext === 'pdf') return IC.filePdf;
    return IC.file;
  }

  function filterMatch(name) {
    if (activeFilter === 'all') return true;
    return name.toLowerCase().endsWith(activeFilter);
  }

  // ---- Tree ----
  async function loadTree(dirPath, container, depth) {
    var result = await window.asrp.files.list(dirPath);
    var files = result.files;
    var error = result.error;
    if (error || !files) { container.innerHTML = '<div style="padding:8px 12px;font-size:12px;color:var(--error)">Error: ' + escHtml(error) + '</div>'; return; }

    var sorted = files.slice().sort(function(a, b) {
      if (a.isDirectory !== b.isDirectory) return a.isDirectory ? -1 : 1;
      if (a.isDirectory && b.isDirectory) {
        // system always last, code second-to-last
        var aPriority = a.name === 'system' ? 2 : a.name === 'code' ? 1 : 0;
        var bPriority = b.name === 'system' ? 2 : b.name === 'code' ? 1 : 0;
        if (aPriority !== bPriority) return aPriority - bPriority;
      }
      return a.name.localeCompare(b.name);
    });

    var visible = sorted.filter(function(f) { return f.isDirectory || filterMatch(f.name); });
    if (depth === 0) {
      visible = visible.filter(function(f) { return !(f.isDirectory && f.name.startsWith('agent-')); });
    }
    if (!visible.length) { container.innerHTML = '<div style="padding:8px 16px;font-size:12px;color:var(--text-tertiary)">Empty</div>'; return; }

    container.innerHTML = '';
    visible.forEach(function(f) {
      var node = document.createElement('div');
      node.className = 'tree-node';
      var indentPx = depth * 16 + 8;

      if (f.isDirectory) {
        // Track directory paths for addFile picker (exclude system, code, and root)
        var relName = f.path.replace(workspacePath, '').replace(/^[/\\]/, '') || f.name;
        var topLevel = relName.split('/')[0].split('\\')[0];
        if (EXCLUDED_DIRS.indexOf(topLevel) === -1) {
          allDirPaths.push({ name: relName, path: f.path });
        }

        var row = document.createElement('div');
        row.className = 'tree-row';
        row.style.paddingLeft = indentPx + 'px';
        row.dataset.folderPath = f.path;
        row.innerHTML = '<span class="tree-toggle">' + IC.chevronRight + '</span><span class="tree-icon">' + IC.folderClosed + '</span><span class="tree-name">' + escHtml(f.name) + '</span>';
        var children = document.createElement('div');
        children.style.display = 'none';
        var expanded = false;
        row.onclick = async function() {
          expanded = !expanded;
          row.querySelector('.tree-toggle').innerHTML = expanded ? IC.chevronDown : IC.chevronRight;
          row.querySelector('.tree-icon').innerHTML = expanded ? IC.folderOpen : IC.folderClosed;
          children.style.display = expanded ? 'block' : 'none';
          // Mark this folder as selected
          document.querySelectorAll('.tree-row.folder-selected').forEach(function(r) { r.classList.remove('folder-selected'); });
          if (expanded) {
            row.classList.add('folder-selected');
            selectedFolderPath = f.path;
          } else {
            selectedFolderPath = '';
          }
          if (expanded && !children.dataset.loaded) {
            children.dataset.loaded = '1';
            children.innerHTML = '<div style="padding:4px 16px;font-size:12px;color:var(--text-tertiary)">Loading...</div>';
            await loadTree(f.path, children, depth + 1);
          }
        };
        node.appendChild(row);
        node.appendChild(children);
      } else {
        var row = document.createElement('div');
        row.className = 'tree-row';
        row.id = 'tree-' + f.path.replace(/[^a-zA-Z0-9]/g, '_');
        row.style.paddingLeft = indentPx + 'px';
        row.innerHTML = '<span class="tree-toggle"></span><span class="tree-icon">' + fileIcon(f.name) + '</span><span class="tree-name">' + escHtml(f.name) + '</span>';
        row.onclick = function() { openFile(f.path, f.name, row); };
        node.appendChild(row);
      }
      container.appendChild(node);
    });
  }

  window.refreshTree = async function() {
    if (!workspacePath) return;
    allDirPaths = [];
    selectedFolderPath = '';
    var tree = document.getElementById('file-tree');
    tree.innerHTML = '<div class="loading" style="padding:20px;justify-content:center"><div class="spinner"></div></div>';
    await loadTree(workspacePath, tree, 0);
  };

  // ---- Open File ----
  async function openFile(filePath, fileName, rowEl) {
    if (unsaved) {
      if (!confirm('You have unsaved changes. Discard?')) return;
    }
    unsaved = false;
    editMode = false;
    currentFilePath = filePath;
    currentFileName = fileName;

    document.querySelectorAll('.tree-row.selected').forEach(function(r) { r.classList.remove('selected'); });
    if (rowEl) rowEl.classList.add('selected');

    document.getElementById('preview-filename').textContent = fileName;
    var acts = document.getElementById('preview-actions');
    acts.style.display = 'flex';
    document.getElementById('edit-toggle-btn').textContent = t('common.edit');
    document.getElementById('save-btn').style.display = 'none';
    document.getElementById('unsaved-banner').style.display = 'none';
    document.getElementById('preview-empty').style.display = 'none';
    document.getElementById('preview-content').style.display = 'none';
    document.getElementById('edit-content').style.display = 'none';
    document.getElementById('pdf-preview').style.display = 'none';

    var ext = fileName.split('.').pop().toLowerCase();

    if (ext === 'pdf') {
      var pdfDiv = document.getElementById('pdf-preview');
      pdfDiv.style.display = 'block';
      var iframe = document.getElementById('pdf-iframe');
      try {
        iframe.src = 'file://' + filePath;
        iframe.style.display = 'block';
        document.getElementById('pdf-fallback').style.display = 'none';
      } catch(e) {
        iframe.style.display = 'none';
        document.getElementById('pdf-fallback').style.display = 'block';
      }
      return;
    }

    document.getElementById('preview-content').style.display = 'block';
    document.getElementById('preview-content').innerHTML = '<div class="loading" style="padding:20px"><div class="spinner"></div> Loading...</div>';

    var result = await window.asrp.files.read(filePath);
    if (!result.success) {
      document.getElementById('preview-content').innerHTML = '<div class="alert error show" style="margin:14px">' + escHtml(result.error) + '</div>';
      return;
    }

    var raw = result.content || '';
    renderPreview(raw, ext, fileName);
    document.getElementById('edit-textarea').value = raw;
  }

  function renderPreview(raw, ext) {
    var lines = raw.split('\n');
    var highlighted = lines.map(function(line) { return highlightLine(line, ext); });
    var withNums = highlighted.map(function(h, i) {
      return '<div><span class="line-num">' + (i + 1) + '</span>' + h + '</div>';
    }).join('');
    document.getElementById('preview-content').innerHTML = '<div class="code-block" style="padding:14px">' + withNums + '</div>';
  }

  function highlightLine(line, ext) {
    var e = escHtml(line);
    if (ext === 'py') return pyHighlight(e);
    if (ext === 'json') return jsonHighlight(e);
    if (ext === 'tex') return texHighlight(e);
    if (ext === 'md') return mdHighlight(e);
    return e;
  }

  function pyHighlight(s) {
    var kw = ['def ','class ','import ','from ','return ','if ','else:','elif ','for ','while ','in ','not ','and ','or ','True','False','None','with ','as ','try:','except','raise ','pass','lambda ','yield '];
    var r = s;
    var ci = r.indexOf('#');
    if (ci >= 0) r = r.slice(0, ci) + '<span class="syn-comment">' + r.slice(ci) + '</span>';
    r = r.replace(/(&#39;&#39;&#39;|&quot;&quot;&quot;|&#39;[^&#39;]*&#39;|&quot;[^&quot;]*&quot;)/g, function(m) { return '<span class="syn-string">' + m + '</span>'; });
    kw.forEach(function(k) { r = r.replace(new RegExp('\\b' + k.trim() + '\\b', 'g'), '<span class="syn-keyword">' + k.trim() + '</span>'); });
    r = r.replace(/\b(\d+\.?\d*)\b/g, '<span class="syn-number">$1</span>');
    return r;
  }

  function jsonHighlight(s) {
    return s
      .replace(/("(?:\\.|[^"\\])*")(\s*:)/g, '<span class="syn-json-key">$1</span>$2')
      .replace(/:\s*("(?:\\.|[^"\\])*")/g, function(m, v) { return m.replace(v, '<span class="syn-string">' + v + '</span>'); })
      .replace(/:\s*(\d+\.?\d*)/g, function(m, v) { return m.replace(v, '<span class="syn-number">' + v + '</span>'); })
      .replace(/:\s*(true|false|null)/g, function(m, v) { return m.replace(v, '<span class="syn-keyword">' + v + '</span>'); });
  }

  function texHighlight(s) {
    return s
      .replace(/(%.*)$/, '<span class="syn-comment">$1</span>')
      .replace(/(\\[a-zA-Z]+)/g, '<span class="syn-tex-cmd">$1</span>')
      .replace(/(\{|\})/g, '<span style="color:var(--orange)">$1</span>');
  }

  function mdHighlight(s) {
    if (/^#{1,6} /.test(s)) return '<span class="syn-md-header">' + s + '</span>';
    if (/^```/.test(s)) return '<span class="syn-md-code">' + s + '</span>';
    return s.replace(/(`[^`]+`)/g, '<span class="syn-md-code">$1</span>');
  }

  // ---- Edit Mode ----
  window.toggleEditMode = function() {
    if (!currentFilePath) return;
    var ext = currentFileName.split('.').pop().toLowerCase();
    if (ext === 'pdf') return;
    editMode = !editMode;
    document.getElementById('edit-toggle-btn').textContent = editMode ? t('common.preview') : t('common.edit');
    document.getElementById('save-btn').style.display = editMode ? 'inline-flex' : 'none';
    document.getElementById('preview-content').style.display = editMode ? 'none' : 'block';
    document.getElementById('edit-content').style.display = editMode ? 'block' : 'none';
  };

  window.markUnsaved = function() {
    if (!unsaved) {
      unsaved = true;
      document.getElementById('unsaved-banner').style.display = 'block';
    }
  };

  window.saveFile = async function() {
    var content = document.getElementById('edit-textarea').value;
    var token = localStorage.getItem('asrp_token');
    var result = await window.asrp.files.write(token, currentFilePath, content);
    if (result.success) {
      unsaved = false;
      document.getElementById('unsaved-banner').style.display = 'none';
      var ext = currentFileName.split('.').pop().toLowerCase();
      renderPreview(content, ext);
      if (typeof Toast !== 'undefined') Toast.show('File saved', 'success');
    } else {
      if (typeof Toast !== 'undefined') Toast.show('Save failed: ' + result.error, 'error');
    }
  };

  // ---- Add File (was Upload) ----
  window.addFile = async function() {
    var result = await window.asrp.files.openDialog({ properties: ['openFile'], title: 'Select file to add' });
    if (result.canceled || !result.filePaths || !result.filePaths.length) return;
    addFileSrcPath = result.filePaths[0];
    var srcName = addFileSrcPath.split(/[/\\]/).pop();

    // Populate destination dropdown — exclude root, system, code
    var select = document.getElementById('addfile-dest-select');
    var opts = allDirPaths.filter(function(d) { return true; }); // already filtered during tree load
    if (!opts.length) {
      opts = [{ name: 'general', path: workspacePath + '/general' }];
    }
    select.innerHTML = opts.map(function(d) {
      return '<option value="' + escHtml(d.path) + '"' +
        (d.path === selectedFolderPath ? ' selected' : '') +
        '>' + escHtml(d.name) + '</option>';
    }).join('');

    // If no match via selectedFolderPath, try to find closest parent in the list
    if (selectedFolderPath && !opts.some(function(d) { return d.path === selectedFolderPath; })) {
      // Selected folder is excluded (e.g. system); just leave default first option
    }

    document.getElementById('addfile-source-name').textContent = srcName;
    updateAddFileDestPath();
    select.onchange = updateAddFileDestPath;
    document.getElementById('addfile-modal').style.display = 'flex';
  };

  function updateAddFileDestPath() {
    var select = document.getElementById('addfile-dest-select');
    var destPath = select.value;
    var srcName = addFileSrcPath.split(/[/\\]/).pop();
    document.getElementById('addfile-dest-path').textContent = destPath + '/' + srcName;
  }

  window.closeAddFileModal = function() {
    document.getElementById('addfile-modal').style.display = 'none';
    addFileSrcPath = '';
  };

  window.confirmAddFile = async function() {
    if (!addFileSrcPath) return;
    var select = document.getElementById('addfile-dest-select');
    var destDir = select.value;
    var srcName = addFileSrcPath.split(/[/\\]/).pop();
    var destPath = destDir + '/' + srcName;

    // Use binary-safe copy (supports PDFs, images, etc.)
    var token = localStorage.getItem('asrp_token');
    var copyResult = await window.asrp.files.copy(token, addFileSrcPath, destPath);
    if (copyResult.success) {
      if (typeof Toast !== 'undefined') Toast.show('Added: ' + srcName, 'success');
      closeAddFileModal();
      refreshTree();
    } else {
      if (typeof Toast !== 'undefined') Toast.show('Failed: ' + (copyResult.error || 'Unknown'), 'error');
    }
  };

  window.downloadFile = async function() {
    if (!currentFilePath) return;
    var result = await window.asrp.files.saveDialog({ defaultPath: currentFileName, title: 'Save file' });
    if (result.canceled) return;
    var content = document.getElementById('edit-textarea').value || '';
    var dlToken = localStorage.getItem('asrp_token');
    await window.asrp.files.write(dlToken, result.filePath, content);
    if (typeof Toast !== 'undefined') Toast.show('File saved', 'success');
  };

  window.openCurrentInExplorer = async function() {
    if (currentFilePath) await window.asrp.system.openPath(currentFilePath);
  };

  window.openInExplorer = async function() {
    await window.asrp.system.openPath(workspacePath);
  };

  // ---- Filter ----
  window.setFileFilter = function(ext) {
    activeFilter = ext;
    document.querySelectorAll('.file-filter-btn').forEach(function(b) { b.classList.remove('active'); });
    var btn = document.querySelector('[data-ext="' + ext + '"]');
    if (btn) btn.classList.add('active');
    refreshTree();
  };

  // ---- Search ----
  window.onSearchInput = function(val) {
    clearTimeout(searchTimeout);
    var clearBtn = document.getElementById('search-clear-btn');
    if (val.trim()) {
      clearBtn.style.display = 'inline-flex';
      searchTimeout = setTimeout(function() { doSearch(val.trim()); }, 400);
    } else {
      clearSearch();
    }
  };

  window.clearSearch = function() {
    document.getElementById('file-search-input').value = '';
    document.getElementById('search-clear-btn').style.display = 'none';
    document.getElementById('search-results-panel').style.display = 'none';
  };

  async function doSearch(query) {
    var resultsPanel = document.getElementById('search-results-panel');
    var resultsList = document.getElementById('search-results-list');
    var label = document.getElementById('search-results-label');
    resultsPanel.style.display = 'block';
    resultsList.innerHTML = '<div class="loading" style="padding:14px"><div class="spinner"></div> Searching...</div>';

    var res = await window.asrp.files.search(query, workspacePath);
    var results = res.results || [];

    label.textContent = results.length + ' result' + (results.length !== 1 ? 's' : '') + ' for "' + query + '"';
    if (!results.length) {
      resultsList.innerHTML = '<div style="padding:14px;font-size:13px;color:var(--text-secondary)">No matches found</div>';
      return;
    }

    resultsList.innerHTML = results.slice(0, 100).map(function(r) {
      return '<div class="search-result-row" onclick="openFileFromSearch(\'' + r.filePath.replace(/'/g, "\\'") + '\', \'' + r.fileName.replace(/'/g, "\\'") + '\')">' +
        '<div class="search-result-file">' + escHtml(r.fileName) + '</div>' +
        (r.lineNum ? '<div class="search-result-line">Line ' + r.lineNum + ': ' + escHtml((r.lineText || '').slice(0, 120)) + '</div>' : '<div class="search-result-line" style="color:var(--text-tertiary)">File name match</div>') +
      '</div>';
    }).join('');
  }

  window.openFileFromSearch = function(filePath, fileName) {
    openFile(filePath, fileName, null);
  };

  // ---- Init ----
  async function init() {
    if (!window.asrp) return;
    var ws = await window.asrp.system.workspace();
    workspacePath = ws.path;
    allDirPaths = [];
    var tree = document.getElementById('file-tree');
    await loadTree(workspacePath, tree, 0);
  }

  init();
  if (typeof translatePage === 'function') translatePage();
  function _filesOnLang() {
    if (typeof translatePage === 'function') translatePage();
  }
  window.addEventListener('language-changed', _filesOnLang);
  if (window.Utils) window.Utils.onPageUnload(function () {
    window.removeEventListener('language-changed', _filesOnLang);
  });
})();
</script>
