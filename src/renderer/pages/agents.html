<div class="page-header">
  <div>
    <h1 data-i18n="agents.title">Agents</h1>
    <p data-i18n="agents.subtitle">Manage your AI research agents — status, models, SOUL, and logs</p>
  </div>
  <div class="actions">
    <button class="btn btn-outline btn-sm" onclick="loadAgents()" data-i18n="agents.refresh">Refresh</button>
  </div>
</div>

<!-- Agent Cards Grid -->
<div class="grid-3 mb-3" id="agent-cards">
  <div class="loading"><div class="spinner"></div> <span data-i18n="agents.loading">Loading agents...</span></div>
</div>

<!-- SOUL Editor Modal -->
<div id="soul-modal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:1000;display:none;align-items:center;justify-content:center">
  <div id="soul-modal-inner" style="background:#fff;border-radius:14px;width:700px;max-width:96vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,0.18)">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border)">
      <div>
        <div style="font-size:16px;font-weight:700" id="soul-modal-title" data-i18n="agents.soul_editor">SOUL Editor</div>
        <div style="font-size:12px;color:var(--text-tertiary);margin-top:2px" data-i18n="agents.soul_hint">Changes take effect after agent restart</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="closeSoulModal()" style="font-size:18px;padding:4px 8px">×</button>
    </div>
    <div style="display:flex;gap:0;border-bottom:1px solid var(--border)">
      <button id="soul-tab-edit" class="soul-tab soul-tab-active" onclick="switchSoulTab('edit')" data-i18n="agents.tab_edit">Edit</button>
      <button id="soul-tab-preview" class="soul-tab" onclick="switchSoulTab('preview')" data-i18n="agents.tab_preview">Preview</button>
    </div>
    <div id="soul-edit-pane" style="flex:1;padding:16px;overflow:auto;min-height:0">
      <textarea id="soul-textarea" style="width:100%;min-height:340px;font-family:'SF Mono',Menlo,Consolas,monospace;font-size:13px;line-height:1.6;border:1px solid var(--border);border-radius:8px;padding:12px;resize:vertical;outline:none;color:var(--text-primary);background:#fafcfa" placeholder="# Agent SOUL&#10;&#10;Define the agent's identity, values, and responsibilities here."></textarea>
    </div>
    <div id="soul-preview-pane" style="display:none;flex:1;padding:16px;overflow:auto;min-height:0">
      <div id="soul-preview-content" style="font-size:14px;line-height:1.7;color:var(--text-primary)"></div>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-top:1px solid var(--border);gap:10px">
      <span style="font-size:12px;color:var(--text-tertiary)" id="soul-save-status"></span>
      <div style="display:flex;gap:8px">
        <button class="btn btn-ghost btn-sm" onclick="closeSoulModal()" data-i18n="common.cancel">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="saveSoul()" data-i18n="agents.save_soul">Save SOUL</button>
      </div>
    </div>
  </div>
</div>

<style>
/* Agent card — clean layout */
.agent-card-new {
  background: var(--card-bg, #fff);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: box-shadow 0.2s, border-color 0.2s;
}
.agent-card-new:hover { box-shadow: 0 4px 16px rgba(74,140,106,0.1); border-color: #c4d8cc; }

/* Header: avatar + info */
.agent-card-header {
  display: flex; align-items: center; gap: 14px;
  padding: 18px 18px 14px; cursor: pointer; user-select: none;
}
.agent-avatar {
  width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 18px; color: #fff;
  background: var(--accent); overflow: hidden;
}
.agent-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
.agent-card-info { flex: 1; min-width: 0; }
.agent-card-name {
  font-size: 15px; font-weight: 700; color: var(--text-primary);
  display: flex; align-items: center; gap: 7px;
}
.agent-card-role { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
.agent-status-dot {
  width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0;
}
.agent-status-dot.running { background: var(--success); }
.agent-status-dot.idle { background: #d0d8d0; }
.agent-status-dot.stopped { background: #ccc; }
.agent-status-dot.error { background: var(--error); }

/* Top-right SOUL button (moved out of the crowded bottom actions row) */
.agent-card-soul-btn {
  flex-shrink: 0;
  align-self: flex-start;
  margin-left: auto;
  padding: 4px 10px !important;
  font-size: 12px !important;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
}

/* Body: model, sessions, uptime, token bar */
.agent-card-body {
  padding: 0 18px 14px;
  display: flex; flex-direction: column; gap: 10px;
}
.agent-info-row {
  display: flex; align-items: center; gap: 10px; font-size: 12px; color: var(--text-secondary);
}
.agent-info-row .info-icon { flex-shrink: 0; display: flex; align-items: center; }
.agent-info-row .info-label { min-width: 54px; color: var(--text-tertiary); }
.agent-info-row .info-value { color: var(--text-secondary); font-weight: 500; }
.agent-token-bar-bg {
  height: 5px; background: var(--surface); border-radius: 3px; overflow: hidden; border: 1px solid var(--border); flex: 1;
}
.agent-token-bar-fill { height: 100%; border-radius: 3px; background: var(--accent); }

/* Model dropdown */
.model-select {
  font-size: 12px; padding: 3px 8px; border: 1px solid var(--border);
  border-radius: 6px; background: var(--surface); color: var(--text-secondary);
  cursor: pointer; outline: none;
}
.model-select:focus { border-color: var(--accent); }

/* Actions */
.agent-actions {
  display: flex; gap: 6px; padding: 10px 18px; border-top: 1px solid var(--border);
  background: var(--surface, #fafcfa);
}

/* Expanded detail section */
.agent-detail-section {
  border-top: 1px solid var(--border);
  padding: 16px 18px;
  display: none;
}
.agent-detail-section.open { display: block; }
.detail-row {
  display: flex; align-items: center; gap: 10px;
  padding: 6px 0; font-size: 12px; color: var(--text-secondary);
  border-bottom: 1px solid var(--border-light, rgba(0,0,0,0.04));
}
.detail-row:last-child { border-bottom: none; }
.detail-row .detail-icon { flex-shrink: 0; display: flex; align-items: center; color: var(--text-tertiary); }
.detail-row .detail-label { min-width: 80px; color: var(--text-tertiary); font-weight: 500; }
.detail-row .detail-value { color: var(--text-secondary); font-weight: 500; }

/* Log viewer */
.agent-log-viewer {
  background: #1a2330; border-radius: 8px; padding: 10px 12px;
  font-family: 'SF Mono', Menlo, Consolas, monospace; font-size: 11px;
  line-height: 1.6; max-height: 180px; overflow-y: auto; color: #a8c4a8; margin-top: 10px;
}
.log-line { display: block; }
.log-line.error { color: #ff6b6b; }
.log-line.warn  { color: #ffd93d; }
.log-line.info  { color: #a8c4a8; }
.log-timestamp { color: #5a8a7a; margin-right: 4px; }

/* Inline rename */
.agent-name-input {
  font-size: 15px; font-weight: 700; color: var(--text-primary);
  border: none; background: transparent; outline: none;
  border-bottom: 1px dashed var(--accent); padding: 0; margin: 0;
  width: 130px; max-width: 130px;
}
.agent-name-input:focus { background: #f4f7f4; border-radius: 4px; padding: 2px 4px; }

/* SOUL modal tabs */
.soul-tab {
  background: none; border: none; border-bottom: 2px solid transparent;
  padding: 10px 20px; font-size: 13px; cursor: pointer; color: var(--text-secondary); transition: all 0.15s;
}
.soul-tab:hover { color: var(--accent); }
.soul-tab-active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

/* Markdown preview */
#soul-preview-content h1 { font-size: 20px; color: var(--text-primary); margin: 0 0 12px; }
#soul-preview-content h2 { font-size: 16px; color: var(--text-primary); margin: 16px 0 8px; }
#soul-preview-content h3 { font-size: 14px; color: var(--accent); margin: 14px 0 6px; }
#soul-preview-content p { margin: 0 0 10px; color: var(--text-secondary); }
#soul-preview-content ul, #soul-preview-content ol { padding-left: 20px; margin: 0 0 10px; color: var(--text-secondary); }
#soul-preview-content li { margin-bottom: 4px; }
#soul-preview-content code { background: #e8f2ec; padding: 1px 5px; border-radius: 4px; font-family: monospace; font-size: 12px; color: #3d7558; }
#soul-preview-content strong { color: var(--text-primary); }
</style>

<script>
(function() {
  const AVAILABLE_MODELS = [
    { value: 'claude-opus-4-6',   label: 'Opus 4.6' },
    { value: 'claude-sonnet-4-6', label: 'Sonnet 4.6' },
    { value: 'claude-haiku-4-5',  label: 'Haiku 4.5' },
  ];

  // Role colors for default avatars
  const ROLE_COLORS = {
    Theorist:  '#7c69f0',
    Engineer:  '#4a8c6a',
    Assistant: '#4a82c8',
  };

  // Minimalist SVG icons (stroke-based, 14px)
  const IC = {
    stop:     '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>',
    play:     '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="6 3 20 12 6 21 6 3"/></svg>',
    restart:  '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>',
    soul:     '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>',
    expand:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>',
    collapse: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>',
    input:    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 13 12 18 7 13"/><line x1="12" y1="2" x2="12" y2="18"/></svg>',
    output:   '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="7 11 12 6 17 11"/><line x1="12" y1="22" x2="12" y2="6"/></svg>',
    cost:     '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>',
    clock:    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>',
    port:     '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>',
    pkg:      '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.89 1.45l8 4A2 2 0 0 1 22 7.24v9.53a2 2 0 0 1-1.11 1.79l-8 4a2 2 0 0 1-1.79 0l-8-4A2 2 0 0 1 2 16.76V7.24a2 2 0 0 1 1.11-1.79l8-4a2 2 0 0 1 1.78 0z"/></svg>',
    model:    '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>',
    session:  '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>',
  };

  // Default avatar: circle with initial letter
  function defaultAvatar(name, role) {
    const color = ROLE_COLORS[role] || 'var(--accent)';
    const initial = (name || '?').charAt(0).toUpperCase();
    return `<div class="agent-avatar" style="background:${color}">${escHtml(initial)}</div>`;
  }

  let currentAgents = [];
  let soulAgentName = '';
  let expandedCards = new Set();

  function shortModel(m) {
    if (!m) return '—';
    if (m.includes('opus'))   return 'Opus 4.6';
    if (m.includes('sonnet')) return 'Sonnet 4.6';
    if (m.includes('haiku'))  return 'Haiku 4.5';
    return m;
  }

  function tokenPct(cost) {
    const max = 3.5;
    return Math.min(100, Math.round((cost / max) * 100));
  }

  function uptimeStr(sec) {
    if (!sec) return '—';
    const h = Math.floor(sec / 3600);
    const m = Math.floor((sec % 3600) / 60);
    return h > 0 ? h + 'h ' + m + 'm' : m + 'm';
  }

  function renderCards(agents) {
    const container = document.getElementById('agent-cards');
    if (!agents || agents.length === 0) {
      container.innerHTML = '<div class="empty-state"><h3>' + escHtml(t('agents.no_agents')) + '</h3><button class="btn btn-primary btn-sm" style="margin-top:12px" onclick="Router.navigate(\'/settings\')">' + escHtml(t('nav.settings')) + '</button></div>';
      return;
    }
    container.innerHTML = agents.map((a) => {
      const statusClass = a.status === 'running' ? 'running' : a.status === 'stopped' ? 'stopped' : 'idle';
      const statusKey = { running: 'agents.status_running', stopped: 'agents.status_stopped', idle: 'agents.status_idle' }[a.status] || 'agents.status_idle';
      const statusLabel = t(statusKey);
      const cost = a.tokenUsage ? a.tokenUsage.cost : 0;
      const pct = tokenPct(cost);
      const isExpanded = expandedCards.has(a.name);
      const safeName = escHtml(a.name);
      const jsName = a.name.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      const modelOptions = AVAILABLE_MODELS.map(m =>
        '<option value="' + escHtml(m.value) + '" ' + (a.model === m.value ? 'selected' : '') + '>' + escHtml(m.label) + '</option>'
      ).join('');

      // Avatar: use Discord avatar URL if available, otherwise default
      const avatarHtml = a.avatarUrl
        ? '<div class="agent-avatar"><img src="' + escHtml(a.avatarUrl) + '" alt="' + safeName + '"></div>'
        : defaultAvatar(a.name, a.role);

      return '<div class="agent-card-new" id="card-' + safeName + '">' +

        // Header
        '<div class="agent-card-header" onclick="toggleCard(\'' + jsName + '\')">' +
          avatarHtml +
          '<div class="agent-card-info">' +
            '<div class="agent-card-name">' +
              '<input class="agent-name-input" id="name-input-' + safeName + '"' +
                ' value="' + safeName + '" title="Click to rename"' +
                ' onclick="event.stopPropagation()"' +
                ' onblur="renameAgent(\'' + jsName + '\', this)"' +
                ' onkeydown="if(event.key===\'Enter\'){this.blur()}"' +
              '/>' +
              '<span class="agent-status-dot ' + escHtml(statusClass) + '" title="' + escHtml(statusLabel) + '"></span>' +
            '</div>' +
            '<div class="agent-card-role">' + escHtml(a.role) + ' · ' + escHtml(statusLabel) + '</div>' +
          '</div>' +
          // Top-right SOUL button (floats via CSS .agent-card-soul-btn)
          '<button class="agent-card-soul-btn btn btn-ghost btn-sm"' +
            ' onclick="event.stopPropagation();openSoulModal(\'' + jsName + '\')"' +
            ' title="' + escHtml(t('agents.soul_editor')) + '">' +
            IC.soul + ' SOUL' +
          '</button>' +
        '</div>' +

        // Body: one row per info item
        '<div class="agent-card-body">' +
          '<div class="agent-info-row">' +
            '<span class="info-icon">' + IC.model + '</span>' +
            '<span class="info-label">' + escHtml(t('agents.model')) + '</span>' +
            '<select class="model-select" id="model-select-' + safeName + '"' +
              ' onchange="switchModel(\'' + jsName + '\', this.value)" title="Switch model">' +
              modelOptions +
            '</select>' +
          '</div>' +
          '<div class="agent-info-row">' +
            '<span class="info-icon">' + IC.session + '</span>' +
            '<span class="info-label">' + escHtml(t('agents.sessions')) + '</span>' +
            '<span class="info-value">' + escHtml(String(a.sessions || 0)) + '</span>' +
          '</div>' +
          '<div class="agent-info-row">' +
            '<span class="info-icon">' + IC.clock + '</span>' +
            '<span class="info-label">' + escHtml(t('agents.uptime')) + '</span>' +
            '<span class="info-value">' + escHtml(uptimeStr(a.uptime)) + '</span>' +
          '</div>' +
          '<div class="agent-info-row">' +
            '<span class="info-icon">' + IC.cost + '</span>' +
            '<span class="info-label">' + escHtml(t('agents.tokens')) + '</span>' +
            '<div class="agent-token-bar-bg">' +
              '<div class="agent-token-bar-fill" style="width:' + escHtml(String(pct)) + '%"></div>' +
            '</div>' +
            '<span style="font-size:11px;color:var(--text-tertiary);min-width:40px;text-align:right">$' + escHtml(cost.toFixed(2)) + '</span>' +
          '</div>' +
        '</div>' +

        // Actions
        '<div class="agent-actions">' +
          (a.status === 'running'
            ? '<button class="btn btn-outline btn-sm" onclick="agentAction(\'' + jsName + '\',\'stop\')">' + IC.stop + ' ' + escHtml(t('agents.stop')) + '</button>' +
              '<button class="btn btn-ghost btn-sm" onclick="agentAction(\'' + jsName + '\',\'restart\')">' + IC.restart + ' ' + escHtml(t('agents.restart')) + '</button>'
            : '<button class="btn btn-primary btn-sm" onclick="agentAction(\'' + jsName + '\',\'start\')">' + IC.play + ' ' + escHtml(t('agents.start')) + '</button>'
          ) +
          '<button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="toggleCard(\'' + jsName + '\')">' +
            (isExpanded ? IC.collapse + ' ' + escHtml(t('agents.collapse')) : IC.expand + ' ' + escHtml(t('agents.details'))) +
          '</button>' +
        '</div>' +

        // Expanded detail
        '<div class="agent-detail-section ' + (isExpanded ? 'open' : '') + '" id="detail-' + safeName + '">' +
          // Detail rows — one item per row
          (a.tokenUsage ? (
            '<div class="detail-row"><span class="detail-icon">' + IC.input + '</span><span class="detail-label">Input</span><span class="detail-value">' + escHtml((a.tokenUsage.input/1000).toFixed(1)) + 'K tokens</span></div>' +
            '<div class="detail-row"><span class="detail-icon">' + IC.output + '</span><span class="detail-label">Output</span><span class="detail-value">' + escHtml((a.tokenUsage.output/1000).toFixed(1)) + 'K tokens</span></div>' +
            '<div class="detail-row"><span class="detail-icon">' + IC.cost + '</span><span class="detail-label">Cost</span><span class="detail-value">$' + escHtml(a.tokenUsage.cost.toFixed(2)) + '</span></div>'
          ) : '<div class="detail-row"><span class="detail-icon">' + IC.cost + '</span><span class="detail-label">Usage</span><span class="detail-value" style="color:var(--text-tertiary)">No data</span></div>') +
          '<div class="detail-row"><span class="detail-icon">' + IC.clock + '</span><span class="detail-label">Uptime</span><span class="detail-value">' + escHtml(uptimeStr(a.uptime)) + '</span></div>' +
          '<div class="detail-row"><span class="detail-icon">' + IC.port + '</span><span class="detail-label">Port</span><span class="detail-value">' + escHtml(String(a.port || '—')) + '</span></div>' +
          '<div class="detail-row"><span class="detail-icon">' + IC.pkg + '</span><span class="detail-label">OpenClaw</span><span class="detail-value">' + (a.openclawVersion ? escHtml(a.openclawVersion) : '<span style="color:var(--text-tertiary)">—</span>') + '</span></div>' +
          '<div class="detail-row"><span class="detail-icon">' + IC.model + '</span><span class="detail-label">Model</span><span class="detail-value">' + escHtml(shortModel(a.model) || '—') + '</span></div>' +

          // Log viewer
          '<div style="margin-top:12px">' +
            '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">' +
              '<div style="font-size:12px;font-weight:600;color:var(--text-secondary)">' + escHtml(t('agents.logs')) + '</div>' +
              '<button class="btn btn-ghost btn-sm" onclick="refreshLogs(\'' + jsName + '\')" style="font-size:11px;padding:2px 8px">' + escHtml(t('agents.refresh')) + '</button>' +
            '</div>' +
            '<div class="agent-log-viewer" id="log-' + safeName + '" style="max-height:200px">' +
              ((a.recentLogs || []).map(function(line) { return formatLogLine(line); }).join('') ||
               '<span class="log-line info">No logs yet — logs appear when agents are running.</span>') +
            '</div>' +
          '</div>' +
        '</div>' +

      '</div>';
    }).join('');
  }

  function formatLogLine(line) {
    var cls = 'info';
    if (/error|ERROR|fail|FAIL/i.test(line)) cls = 'error';
    else if (/warn|WARN|warning/i.test(line)) cls = 'warn';
    var tsMatch = line.match(/^\[[\d:]+\]/);
    if (tsMatch) {
      var ts = tsMatch[0];
      var rest = line.slice(ts.length);
      return '<span class="log-line ' + cls + '"><span class="log-timestamp">' + escHtml(ts) + '</span>' + escHtml(rest) + '</span>';
    }
    return '<span class="log-line ' + cls + '">' + escHtml(line) + '</span>';
  }

  function escHtml(s) {
    return String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  window.toggleCard = function(name) {
    var detailEl = document.getElementById('detail-' + escHtml(name));
    var cardEl = document.getElementById('card-' + escHtml(name));
    var isExpanding = !expandedCards.has(name);

    if (isExpanding) expandedCards.add(name);
    else expandedCards.delete(name);

    if (detailEl) {
      if (isExpanding) detailEl.classList.add('open');
      else detailEl.classList.remove('open');
    }

    // Update only this card's toggle button
    if (cardEl) {
      var allBtns = cardEl.querySelectorAll('.agent-actions button');
      var toggleBtn = allBtns[allBtns.length - 1]; // last button is toggle
      if (toggleBtn) {
        toggleBtn.innerHTML = isExpanding ? (IC.collapse + ' ' + escHtml(t('agents.collapse'))) : (IC.expand + ' ' + escHtml(t('agents.details')));
      }
    }
  };

  window.renameAgent = async function(oldName, inputEl) {
    var newName = inputEl.value.trim();
    if (!newName || newName === oldName) return;
    try {
      if (window.asrp && window.asrp.agents) {
        var _tk = localStorage.getItem('asrp_token') || '';
        await window.asrp.agents.rename(_tk, oldName, newName);
      }
      currentAgents = currentAgents.map(function(a) { return a.name === oldName ? Object.assign({}, a, { name: newName }) : a; });
      if (expandedCards.has(oldName)) { expandedCards.delete(oldName); expandedCards.add(newName); }
      showToast(t('agents.agent_started', { name: newName }), 'success');
      renderCards(currentAgents);
    } catch (e) {
      showToast('Rename failed', 'error');
      inputEl.value = oldName;
    }
  };

  window.switchModel = async function(agentName, model) {
    try {
      if (window.asrp && window.asrp.agents) {
        var _tk = localStorage.getItem('asrp_token') || '';
        await window.asrp.agents.setModel(_tk, agentName, model);
      }
      currentAgents = currentAgents.map(function(a) { return a.name === agentName ? Object.assign({}, a, { model: model }) : a; });
      showToast(t('agents.model_updated', { model: shortModel(model) }), 'success');
    } catch (e) {
      showToast('Model switch failed', 'error');
    }
  };

  window.agentAction = async function(agentName, action) {
    try {
      if (window.asrp && window.asrp.agents) {
        var _tk = localStorage.getItem('asrp_token') || '';
        if (action === 'start') await window.asrp.agents.start(_tk, agentName);
        else if (action === 'stop') await window.asrp.agents.stop(_tk, agentName);
        else if (action === 'restart') await window.asrp.agents.restart(_tk, agentName);
      }
      var newStatus = action === 'start' ? 'running' : action === 'stop' ? 'stopped' : 'idle';
      currentAgents = currentAgents.map(function(a) { return a.name === agentName ? Object.assign({}, a, { status: newStatus }) : a; });
      var actionKey = { start: 'agents.agent_started', stop: 'agents.agent_stopped', restart: 'agents.agent_restarted' }[action] || 'agents.agent_started';
      showToast(t(actionKey, { name: agentName }), 'success');
      renderCards(currentAgents);
    } catch (e) {
      showToast('Action failed: ' + e.message, 'error');
    }
  };

  window.refreshLogs = async function(agentName) {
    var logEl = document.getElementById('log-' + agentName);
    if (!logEl) return;
    logEl.innerHTML = '<span class="log-line info">Loading...</span>';
    try {
      if (window.asrp && window.asrp.agents) {
        var token = localStorage.getItem('asrp_token') || '';
        var res = await window.asrp.agents.logs(token, agentName);
        logEl.innerHTML = (res.logs || []).map(formatLogLine).join('') || '<span class="log-line info">No logs.</span>';
        logEl.scrollTop = logEl.scrollHeight;
      }
    } catch (e) {
      logEl.innerHTML = '<span class="log-line error">Failed to load logs.</span>';
    }
  };

  window.openSoulModal = async function(agentName) {
    soulAgentName = agentName;
    var modal = document.getElementById('soul-modal');
    var title = document.getElementById('soul-modal-title');
    var textarea = document.getElementById('soul-textarea');
    var saveStatus = document.getElementById('soul-save-status');
    title.textContent = agentName + ' — ' + t('agents.soul_editor');
    textarea.value = 'Loading...';
    saveStatus.textContent = '';
    modal.style.display = 'flex';
    switchSoulTab('edit');
    try {
      if (window.asrp && window.asrp.agents) {
        var res = await window.asrp.agents.getSoul(agentName);
        textarea.value = res.content || '';
      }
    } catch (e) {
      textarea.value = '# ' + agentName + ' SOUL\n\n(Error loading SOUL file)';
    }
  };

  window.closeSoulModal = function() {
    document.getElementById('soul-modal').style.display = 'none';
    soulAgentName = '';
  };

  window.switchSoulTab = function(tab) {
    var editPane = document.getElementById('soul-edit-pane');
    var previewPane = document.getElementById('soul-preview-pane');
    var tabEdit = document.getElementById('soul-tab-edit');
    var tabPreview = document.getElementById('soul-tab-preview');
    if (tab === 'edit') {
      editPane.style.display = 'block'; previewPane.style.display = 'none';
      tabEdit.classList.add('soul-tab-active'); tabPreview.classList.remove('soul-tab-active');
    } else {
      editPane.style.display = 'none'; previewPane.style.display = 'block';
      tabEdit.classList.remove('soul-tab-active'); tabPreview.classList.add('soul-tab-active');
      document.getElementById('soul-preview-content').innerHTML = renderMarkdown(document.getElementById('soul-textarea').value);
    }
  };

  function renderMarkdown(md) {
    return md
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/^#{3}\s+(.+)$/gm, '<h3>$1</h3>')
      .replace(/^#{2}\s+(.+)$/gm, '<h2>$1</h2>')
      .replace(/^#{1}\s+(.+)$/gm, '<h1>$1</h1>')
      .replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>')
      .replace(/\*([^*\n]+)\*/g, '<em>$1</em>')
      .replace(/`([^`\n]+)`/g, '<code>$1</code>')
      .replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>')
      .replace(/^[-*]\s+(.+)$/gm, '<li>$1</li>')
      .replace(/(<li>.*<\/li>\n?)+/g, function(m) { return '<ul>' + m + '</ul>'; })
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>')
      .replace(/^(?!<[hup])(.+)/, '<p>$1');
  }

  window.saveSoul = async function() {
    if (!soulAgentName) return;
    var content = document.getElementById('soul-textarea').value;
    var saveStatus = document.getElementById('soul-save-status');
    saveStatus.textContent = 'Saving...';
    try {
      if (window.asrp && window.asrp.agents) {
        var token = localStorage.getItem('asrp_token') || '';
        await window.asrp.agents.saveSoul(token, soulAgentName, content);
      }
      saveStatus.textContent = t('agents.soul_saved');
      saveStatus.style.color = 'var(--success)';
      showToast(t('agents.soul_saved'), 'success');
    } catch (e) {
      saveStatus.textContent = t('agents.soul_save_failed');
      saveStatus.style.color = 'var(--error)';
    }
  };

  document.getElementById('soul-modal').addEventListener('click', function(e) {
    if (e.target === this) closeSoulModal();
  });

  window.loadAgents = async function() {
    if (!window.asrp) return;
    var container = document.getElementById('agent-cards');
    container.innerHTML = '<div class="loading"><div class="spinner"></div> ' + escHtml(t('agents.loading')) + '</div>';

    try {
      var agents = [];

      if (window.asrp.openclaw) {
        var res = await window.asrp.openclaw.agentStatuses();
        agents = res.agents || [];
      }
      if (agents.length === 0 && window.asrp.agents) {
        var res2 = await window.asrp.agents.status();
        agents = (res2.agents || []).map(function(a) {
          return Object.assign({}, a, { sessions: 0, tokenUsage: { input: 0, output: 0, cost: 0 }, uptime: 0, recentLogs: [] });
        });
      }

      if (agents.length === 0 && window.asrp.settings) {
        var settings = await window.asrp.settings.get();
        var savedConfigs = settings.agentConfigs;
        if (Array.isArray(savedConfigs)) {
          agents = savedConfigs.filter(function(c) { return c && c.agentId; }).map(function(c) {
            return {
              name: c.discordBotName || c.customName || c.agentId || 'Agent',
              role: c.role || 'Assistant',
              status: 'stopped',
              model: c.model || '',
              sessions: 0,
              tokenUsage: { input: 0, output: 0, cost: 0 },
              uptime: 0,
              recentLogs: ['Click Start to connect to Discord'],
            };
          });
        }
      }

      if (agents.length > 0 && agents.every(function(a) { return a.status === 'stopped'; })) {
        container.innerHTML = '';
        var banner = document.createElement('div');
        banner.style.cssText = 'background:rgba(74,140,106,0.06);border:1px solid rgba(74,140,106,0.2);border-radius:10px;padding:14px 18px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between';
        banner.innerHTML = '<span style="font-size:13px;color:var(--text-secondary)">Agents are configured but not running.</span>';
        var startBtn = document.createElement('button');
        startBtn.className = 'btn btn-primary btn-sm';
        startBtn.textContent = 'Start All Agents';
        startBtn.onclick = async function() {
          startBtn.disabled = true; startBtn.textContent = 'Starting...';
          try {
            var tk = localStorage.getItem('asrp_token') || '';
            if (window.asrp.gateway) await window.asrp.gateway.start(tk);
            setTimeout(loadAgents, 3000);
          } catch(e) { startBtn.textContent = 'Failed'; }
        };
        banner.appendChild(startBtn);
        container.appendChild(banner);
      }

      currentAgents = agents;
      renderCards(agents);
    } catch (e) {
      container.innerHTML = '<div class="empty-state"><p>Error loading agents: ' + escHtml(e.message) + '</p></div>';
    }
  };

  function showToast(msg, type) {
    if (typeof Toast !== 'undefined') Toast.show(msg, type);
  }

  if (window.asrp && window.asrp.agents && window.asrp.agents.onStatusUpdate) {
    window.asrp.agents.onStatusUpdate(function(updatedAgents) {
      if (!document.getElementById('agent-cards')) return;
      if (currentAgents.length === 0) return;
      currentAgents = currentAgents.map(function(a) {
        var upd = updatedAgents.find(function(u) { return u.name === a.name; });
        return upd ? Object.assign({}, a, upd) : a;
      });
      renderCards(currentAgents);
    });
  }

  // Re-render on language change
  function _agentsOnLang() {
    if (typeof translatePage === 'function') translatePage();
    try { renderCards(currentAgents); } catch (e) {}
  }
  window.addEventListener('language-changed', _agentsOnLang);
  if (window.Utils) window.Utils.onPageUnload(function () {
    window.removeEventListener('language-changed', _agentsOnLang);
  });

  loadAgents();
})();
</script>
