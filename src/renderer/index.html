<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Issue #20: 'unsafe-inline' is required because the SPA router re-executes
       <script> tags from loaded page fragments via executeScripts(). Removing it
       would require a nonce-based approach or a module-based router rewrite. -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self' app:;
    script-src 'self' 'unsafe-inline';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: app:;
    font-src 'self' data: app:;
    connect-src 'self' app: https://openrouter.ai/api/ https://asrp.jzis.org/api/;
  ">
  <title>ASRP Desktop</title>
  <link rel="stylesheet" href="css/mint-apple.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- App Shell -->
<div id="app">

  <!-- Left Sidebar (rendered by sidebar.js) -->
  <div id="sidebar"></div>

  <!-- Right Content Area -->
  <div id="content-area">

    <!-- Top header bar (shown for sidebar pages) -->
    <div class="content-header">
      <div class="content-header-left">
        <div class="breadcrumb">
          <span>ASRP</span>
          <span style="color:var(--border)">›</span>
          <span class="current">Dashboard</span>
        </div>
      </div>
      <div class="content-header-right">
        <!-- Offline badge (T-032) -->
        <span id="offline-badge" style="display:none;font-size:11px;background:#fee;color:#c33;padding:2px 8px;border-radius:8px;border:1px solid #fcc">⚠ Offline</span>
        <!-- User info / status -->
        <span id="header-status" style="font-size:12px;color:var(--text-tertiary)">Ready</span>
        <!-- Assistant toggle button -->
        <button
          class="btn btn-ghost btn-sm"
          title="Assistant (Cmd+J)"
          onclick="if(typeof toggleAssistant==='function') toggleAssistant()"
          style="padding:4px 8px"
        >✨</button>
        <button
          class="btn btn-ghost btn-sm"
          title="Settings"
          onclick="Router.navigate('/settings')"
          style="padding:4px 8px"
        >⚙️</button>
      </div>
    </div>

    <!-- Page Content — fragments loaded here by router -->
    <div id="page-content">
      <!-- Initial loading state -->
      <div class="loading">
        <div class="spinner"></div>
        Loading…
      </div>
    </div>

  </div>

  <!-- Page loading overlay -->
  <div id="page-loading">
    <div class="spinner" style="width:28px;height:28px;border-width:3px;"></div>
  </div>

  <!-- Update bar removed — now handled inline in sidebar (Claude-style) -->

</div>

<!-- Toast notifications -->
<div id="toast-container"></div>

<!-- Keyboard Shortcuts Help Modal (Cmd/Ctrl+/) -->
<div id="shortcuts-modal" class="modal-overlay hidden" onclick="if(event.target===this)this.classList.add('hidden')">
  <div class="modal-box">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <h3 style="margin:0">⌨️ Keyboard Shortcuts</h3>
      <button class="btn btn-ghost btn-sm" onclick="document.getElementById('shortcuts-modal').classList.add('hidden')">✕</button>
    </div>
    <div style="margin-bottom:12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-tertiary)">Navigation</div>
    <div class="shortcut-row">
      <span>Dashboard</span>
      <span class="shortcut-key"><kbd>⌘</kbd><kbd>D</kbd></span>
    </div>
    <div class="shortcut-row">
      <span>Settings</span>
      <span class="shortcut-key"><kbd>⌘</kbd><kbd>,</kbd></span>
    </div>
    <div class="shortcut-row">
      <span>Toggle Sidebar</span>
      <span class="shortcut-key"><kbd>⌘</kbd><kbd>B</kbd></span>
    </div>
    <div class="shortcut-row">
      <span>Toggle Assistant</span>
      <span class="shortcut-key"><kbd>⌘</kbd><kbd>J</kbd></span>
    </div>
    <div class="shortcut-row">
      <span>Show Shortcuts</span>
      <span class="shortcut-key"><kbd>⌘</kbd><kbd>/</kbd></span>
    </div>
    <div style="margin-top:16px;margin-bottom:12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-tertiary)">Pages</div>
    <div class="shortcut-row">
      <span>Agents</span>
      <span class="shortcut-key"><kbd>G</kbd> then <kbd>A</kbd></span>
    </div>
    <div class="shortcut-row">
      <span>Researches</span>
      <span class="shortcut-key"><kbd>G</kbd> then <kbd>E</kbd></span>
    </div>
    <div class="shortcut-row">
      <span>Files</span>
      <span class="shortcut-key"><kbd>G</kbd> then <kbd>F</kbd></span>
    </div>
    <div class="shortcut-row">
      <span>Papers</span>
      <span class="shortcut-key"><kbd>G</kbd> then <kbd>P</kbd></span>
    </div>
    <div class="shortcut-row">
      <span>Audit Log</span>
      <span class="shortcut-key"><kbd>G</kbd> then <kbd>L</kbd></span>
    </div>
    <div style="margin-top:16px;font-size:11px;color:var(--text-tertiary);text-align:center">
      Use <kbd>Ctrl</kbd> instead of <kbd>⌘</kbd> on Windows/Linux
    </div>
  </div>
</div>

<!-- Scripts — order matters -->
<script src="js/error-handler.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/router.js"></script>
<script src="js/assistant-chat.js"></script>

<script>
  // Issue #7: navigate listener removed — router.js Router.init() already registers it.

  // Keyboard shortcuts
  var _chordPending = false;
  var _chordTimer = null;

  document.addEventListener('keydown', (e) => {
    // Single-key chords: G then A/E/F/P/L
    if (_chordPending && !e.metaKey && !e.ctrlKey && !e.altKey) {
      clearTimeout(_chordTimer);
      _chordPending = false;
      const key = e.key.toLowerCase();
      if (key === 'a') { e.preventDefault(); Router.navigate('/agents'); return; }
      if (key === 'e') { e.preventDefault(); Router.navigate('/researches'); return; }
      if (key === 'f') { e.preventDefault(); Router.navigate('/files'); return; }
      if (key === 'p') { e.preventDefault(); Router.navigate('/papers'); return; }
      if (key === 'l') { e.preventDefault(); Router.navigate('/audit'); return; }
    }

    // Cmd/Ctrl shortcuts
    if ((e.metaKey || e.ctrlKey) && e.key === ',') {
      e.preventDefault();
      Router.navigate('/settings');
    }
    if ((e.metaKey || e.ctrlKey) && e.key === 'd') {
      e.preventDefault();
      Router.navigate('/dashboard');
    }
    // Cmd/Ctrl+/ — show shortcuts modal
    if ((e.metaKey || e.ctrlKey) && e.key === '/') {
      e.preventDefault();
      var modal = document.getElementById('shortcuts-modal');
      if (modal) modal.classList.toggle('hidden');
    }
    // Escape — dismiss any modal
    if (e.key === 'Escape') {
      var modal = document.getElementById('shortcuts-modal');
      if (modal && !modal.classList.contains('hidden')) {
        modal.classList.add('hidden');
      }
    }
    // G — start chord sequence (navigate to page)
    if (!e.metaKey && !e.ctrlKey && !e.altKey && e.key === 'g') {
      // Only trigger if not typing in an input
      var tag = document.activeElement && document.activeElement.tagName;
      if (tag !== 'INPUT' && tag !== 'TEXTAREA' && tag !== 'SELECT') {
        _chordPending = true;
        _chordTimer = setTimeout(function() { _chordPending = false; }, 1500);
      }
    }
  });

  // T-032: Offline mode detection
  (function() {
    function updateOfflineBadge() {
      var badge = document.getElementById('offline-badge');
      if (badge) badge.style.display = navigator.onLine ? 'none' : 'inline';
    }
    window.addEventListener('online', updateOfflineBadge);
    window.addEventListener('offline', updateOfflineBadge);
    updateOfflineBadge();
  })();

  // ========== UPDATE LOGIC ==========
  // Update UI now handled by sidebar.js (Claude-style inline prompt).
  // Keep legacy onStatus listener as fallback for settings page.
  if (window.asrp && window.asrp.updater && window.asrp.updater.onStatus) {
    // Sidebar registers its own listener in setupUpdateListener()
    // No additional listener needed here.
  }

  // Global toast utility
  window.showToast = function(message, type, duration) {
    var container = document.getElementById('toast-container');
    if (!container) return;
    type = type || 'success';
    duration = duration || 3500;
    var icons = { success: '✅', error: '❌', warning: '⚠️' };
    var toast = document.createElement('div');
    toast.className = 'toast ' + type;
    // Issue #4: Use DOM methods instead of innerHTML to prevent XSS
    var iconSpan = document.createElement('span');
    iconSpan.textContent = icons[type] || '';
    var msgSpan = document.createElement('span');
    msgSpan.style.flex = '1';
    msgSpan.textContent = message;
    toast.appendChild(iconSpan);
    toast.appendChild(msgSpan);
    container.appendChild(toast);
    setTimeout(function() {
      toast.style.opacity = '0';
      toast.style.transform = 'translateX(100%)';
      toast.style.transition = 'all 0.3s ease';
      setTimeout(function() { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 300);
    }, duration);
  };
</script>

</body>
</html>
