<!-- H4: Demo mode banner -->
<div id="demo-banner" style="background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:8px 16px;margin-bottom:14px;font-size:13px;color:#856404;display:flex;align-items:center;gap:8px">
  <span>⚠️</span>
  <span><strong>Demo Mode</strong> — Displaying sample data. Connect to OpenClaw for live data.</span>
</div>

<div class="page-header">
  <div>
    <h1>Experiments</h1>
    <p>Register, track, and review ASRP research experiments</p>
  </div>
  <div class="actions">
    <button class="btn btn-primary btn-sm" onclick="showRegisterModal()">+ Register Experiment</button>
  </div>
</div>

<!-- Filter + Sort Bar -->
<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center">
  <!-- Status filters -->
  <div style="display:flex;gap:6px;flex-wrap:wrap">
    <button class="exp-filter active" data-filter="all" onclick="setFilter('all')">All</button>
    <button class="exp-filter" data-filter="registered" onclick="setFilter('registered')">Registered</button>
    <button class="exp-filter" data-filter="running" onclick="setFilter('running')">Running</button>
    <button class="exp-filter" data-filter="confirmed" onclick="setFilter('confirmed')">Confirmed</button>
    <button class="exp-filter" data-filter="refuted" onclick="setFilter('refuted')">Refuted</button>
  </div>
  <!-- Research line filter -->
  <select id="rl-filter" style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg-secondary);color:var(--text);margin-left:auto" onchange="applyFilters()">
    <option value="">All Research Lines</option>
    <option value="RH">RH — Resonance Hypothesis</option>
    <option value="SC">SC — String Condensate</option>
    <option value="BC">BC — Boundary Conditions</option>
    <option value="Other">Other</option>
  </select>
  <!-- Sort -->
  <select id="sort-select" style="padding:4px 8px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg-secondary);color:var(--text)" onchange="applyFilters()">
    <option value="date-desc">Newest first</option>
    <option value="date-asc">Oldest first</option>
    <option value="score-desc">Score ↓</option>
    <option value="status">Status</option>
  </select>
  <!-- Search -->
  <div style="display:flex;align-items:center;gap:6px;border:1px solid var(--border);border-radius:6px;padding:4px 8px;background:var(--bg-secondary)">
    <span style="font-size:12px">🔍</span>
    <input type="text" id="exp-search" placeholder="Search hypothesis..." style="border:none;outline:none;background:transparent;font-size:12px;color:var(--text);width:160px" oninput="applyFilters()">
  </div>
</div>

<!-- Experiments List View -->
<div id="exp-list-view">
  <div id="exp-cards" class="grid-2">
    <div class="loading" style="grid-column:span 2;text-align:center;padding:40px"><div class="spinner"></div> Loading...</div>
  </div>
</div>

<!-- Experiment Detail View -->
<div id="exp-detail-view" style="display:none">
  <button class="btn btn-ghost btn-sm" style="margin-bottom:14px" onclick="backToExpList()">← Back to Experiments</button>
  <div id="exp-detail-content"></div>
</div>

<!-- Register Modal -->
<div id="register-modal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.45);align-items:center;justify-content:center">
  <div class="panel" style="width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;padding:0">
    <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between">
      <h3 style="margin:0">🧪 Register Experiment</h3>
      <button class="btn btn-ghost btn-sm" onclick="closeRegisterModal()">✕</button>
    </div>
    <div style="padding:20px">
      <div class="alert" id="reg-alert"></div>
      <div class="form-group">
        <label>Hypothesis <span style="color:var(--error)">*</span></label>
        <textarea id="reg-hypothesis" rows="3" placeholder="State a falsifiable hypothesis. e.g.: Multi-well DD correction with exact KS gap restores binding accuracy to <0.01% for d=5,6,7" style="resize:vertical"></textarea>
      </div>
      <div class="form-group">
        <label>Method</label>
        <textarea id="reg-method" rows="2" placeholder="Computational method, code, tolerances..." style="resize:vertical"></textarea>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label>Expected Result</label>
          <input type="text" id="reg-expected" placeholder="e.g. DD > 0 for all d">
        </div>
        <div class="form-group">
          <label>Research Line</label>
          <select id="reg-rl">
            <option value="RH">RH — Resonance Hypothesis</option>
            <option value="SC">SC — String Condensate</option>
            <option value="BC">BC — Boundary Conditions</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label>Success Criteria (quantitative)</label>
          <input type="text" id="reg-success" placeholder="e.g. |ΔE| < 0.001 Hartree">
        </div>
        <div class="form-group">
          <label>Failure Criteria</label>
          <input type="text" id="reg-failure" placeholder="e.g. DD < 0 or diverges">
        </div>
      </div>
      <div class="form-group">
        <label>Estimated Compute Time</label>
        <input type="text" id="reg-compute" placeholder="e.g. 2h on 8-core CPU">
      </div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <button class="btn btn-primary" onclick="submitRegistration()">Register Experiment</button>
        <button class="btn btn-outline" onclick="closeRegisterModal()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<style>
.exp-filter {
  padding:4px 12px;border-radius:12px;font-size:12px;border:1px solid var(--border);background:var(--bg-secondary);cursor:pointer;color:var(--text-secondary);transition:all 0.15s
}
.exp-filter.active { background:var(--accent);color:#fff;border-color:var(--accent) }
.exp-card { position:relative }
.exp-status-badge {
  padding:3px 9px;border-radius:10px;font-size:11px;font-weight:600;display:inline-block
}
.exp-status-badge.registered { background:#e2e8f0;color:#475569 }
.exp-status-badge.running { background:#fef3c7;color:#92400e }
.exp-status-badge.confirmed { background:#d1fae5;color:#065f46 }
.exp-status-badge.refuted { background:#fee2e2;color:#991b1b }
.exp-score-bar { height:6px;border-radius:3px;background:var(--border);overflow:hidden }
.exp-score-fill { height:100%;border-radius:3px;background:var(--accent);transition:width 0.4s }
.validation-check { display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border-light,var(--border)) }
.validation-check:last-child { border-bottom:none }
</style>

<script>
(function() {
  let allExperiments = [];
  let activeStatusFilter = 'all';

  // Extended mock data with all fields
  const MOCK_EXPERIMENTS = [
    {
      id: 'EXP-2026-04-02-003',
      hypothesis: 'Multi-well DD with exact KS gap at d=5,6,7 restores binding accuracy to <0.01%',
      method: 'iDEA reverse-KS code, tol=1e-6, mu=3.0',
      expected: 'DD positive, ~0.2 Hartree per well',
      successCriteria: '|ΔE| < 0.001 Hartree for all d',
      failureCriteria: 'DD < 0 or fails to converge',
      researchLine: 'RH',
      computeTime: '3h on 8-core CPU',
      status: 'running',
      score: null,
      created: '2026-04-02',
      result: null,
      validations: [
        { label: 'Hypothesis falsifiable', checked: true },
        { label: 'Method reproducible', checked: true },
        { label: 'Success criteria quantitative', checked: true },
        { label: 'Result recorded in registry', checked: false },
        { label: 'Linked to paper draft', checked: false },
      ],
    },
    {
      id: 'EXP-2026-04-01-002',
      hypothesis: 'Prime-spaced wells produce negative DD correction (sign flip)',
      method: 'iDEA 1D model with d = 2,3,5,7,11 Bohr',
      expected: 'DD < 0',
      successCriteria: 'At least 3/5 spacings give DD < 0',
      failureCriteria: 'All DD > 0',
      researchLine: 'RH',
      computeTime: '1h',
      status: 'refuted',
      score: 0.1,
      created: '2026-04-01',
      result: 'All DD values remained positive (0.08–0.21 Hartree). Sign flip not observed. KS gap definition may need revision.',
      validations: [
        { label: 'Hypothesis falsifiable', checked: true },
        { label: 'Method reproducible', checked: true },
        { label: 'Success criteria quantitative', checked: true },
        { label: 'Result recorded in registry', checked: true },
        { label: 'Linked to paper draft', checked: false },
      ],
    },
    {
      id: 'EXP-2026-04-01-001',
      hypothesis: 'LDA overestimates 2-electron atom binding energy by >1% vs exact result',
      method: 'iDEA exact solver + LDA calculation, 2e atom',
      expected: 'LDA binding > exact binding by >1%',
      successCriteria: 'Relative error > 0.01',
      failureCriteria: 'Relative error ≤ 0.01',
      researchLine: 'RH',
      computeTime: '30min',
      status: 'confirmed',
      score: 0.95,
      created: '2026-04-01',
      result: 'LDA binding energy = 2.907 Hartree, exact = 2.904 Hartree. Relative error = 0.103%. Confirms LDA overbinding.',
      validations: [
        { label: 'Hypothesis falsifiable', checked: true },
        { label: 'Method reproducible', checked: true },
        { label: 'Success criteria quantitative', checked: true },
        { label: 'Result recorded in registry', checked: true },
        { label: 'Linked to paper draft', checked: true },
      ],
    },
    {
      id: 'EXP-2026-03-31-005',
      hypothesis: 'Electron membrane model predicts nodal pattern consistent with Stodolna 2013 imaging',
      method: 'Analytic membrane model + comparison with published data',
      expected: 'Nodal ring spacing matches within 5%',
      successCriteria: 'RMSE < 5% across 4 observed rings',
      failureCriteria: 'RMSE > 10%',
      researchLine: 'SC',
      computeTime: '2h',
      status: 'confirmed',
      score: 0.88,
      created: '2026-03-31',
      result: 'RMSE = 3.2% across Stodolna\'s 4 ring dataset. Model consistent with observation.',
      validations: [
        { label: 'Hypothesis falsifiable', checked: true },
        { label: 'Method reproducible', checked: true },
        { label: 'Success criteria quantitative', checked: true },
        { label: 'Result recorded in registry', checked: true },
        { label: 'Linked to paper draft', checked: false },
      ],
    },
    {
      id: 'EXP-2026-04-02-004',
      hypothesis: 'Fibonacci lattice grid reduces DFT ill-conditioning vs uniform grid for N>100 basis functions',
      method: 'Condition number comparison, random matrix experiment',
      expected: 'κ(A_Fibonacci) < κ(A_uniform)',
      successCriteria: 'Condition number ratio > 2x improvement',
      failureCriteria: 'No statistically significant difference',
      researchLine: 'BC',
      computeTime: '4h',
      status: 'registered',
      score: null,
      created: '2026-04-02',
      result: null,
      validations: [
        { label: 'Hypothesis falsifiable', checked: true },
        { label: 'Method reproducible', checked: false },
        { label: 'Success criteria quantitative', checked: true },
        { label: 'Result recorded in registry', checked: false },
        { label: 'Linked to paper draft', checked: false },
      ],
    },
  ];

  function statusColor(s) {
    return { registered: '#64748b', running: '#d97706', confirmed: '#059669', refuted: '#dc2626' }[s] || '#888';
  }

  function renderCards(list) {
    const container = document.getElementById('exp-cards');
    if (!list.length) {
      container.innerHTML = '<div class="empty-state" style="grid-column:span 2"><span class="icon">🧪</span><h3>No experiments match</h3><p>Try changing the filter</p></div>';
      return;
    }
    container.innerHTML = list.map(e => {
      const scoreBar = e.score !== null ? `<div style="margin-top:8px"><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary);margin-bottom:3px"><span>Score</span><span>${(e.score * 100).toFixed(0)}%</span></div><div class="exp-score-bar"><div class="exp-score-fill" style="width:${(e.score*100).toFixed(0)}%;background:${e.score>0.5?'var(--success)':'var(--error)'}"></div></div></div>` : '';
      const hyp = e.hypothesis.length > 100 ? e.hypothesis.slice(0,100) + '…' : e.hypothesis;
      return `<div class="card exp-card" style="cursor:pointer;border-left:3px solid ${statusColor(e.status)}" onclick="openExpDetail('${e.id}')">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px">
          <span style="font-family:var(--font-mono);font-size:11px;color:var(--text-tertiary)">${e.id}</span>
          <span class="exp-status-badge ${e.status}">${capitalize(e.status)}</span>
        </div>
        <p style="font-size:13px;color:var(--text);line-height:1.5;margin-bottom:8px">${escHtml(hyp)}</p>
        <div style="display:flex;gap:12px;font-size:12px;color:var(--text-secondary)">
          <span>📐 ${e.researchLine}</span>
          <span>📅 ${e.created}</span>
          ${e.computeTime ? `<span>⏱ ${e.computeTime}</span>` : ''}
        </div>
        ${scoreBar}
      </div>`;
    }).join('');
  }

  window.applyFilters = function() {
    const rl = document.getElementById('rl-filter').value;
    const sort = document.getElementById('sort-select').value;
    const search = document.getElementById('exp-search').value.toLowerCase();

    let filtered = allExperiments.filter(e => {
      if (activeStatusFilter !== 'all' && e.status !== activeStatusFilter) return false;
      if (rl && e.researchLine !== rl) return false;
      if (search && !e.hypothesis.toLowerCase().includes(search) && !e.id.toLowerCase().includes(search)) return false;
      return true;
    });

    filtered = filtered.sort((a, b) => {
      if (sort === 'date-asc') return a.created.localeCompare(b.created);
      if (sort === 'score-desc') return (b.score||0) - (a.score||0);
      if (sort === 'status') return a.status.localeCompare(b.status);
      return b.created.localeCompare(a.created); // date-desc default
    });

    renderCards(filtered);
  };

  window.setFilter = function(f) {
    activeStatusFilter = f;
    document.querySelectorAll('.exp-filter').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-filter="${f}"]`)?.classList.add('active');
    applyFilters();
  };

  // ---- Detail View (T-064) ----
  window.openExpDetail = function(id) {
    const e = allExperiments.find(x => x.id === id);
    if (!e) return;
    document.getElementById('exp-list-view').style.display = 'none';
    document.getElementById('exp-detail-view').style.display = 'block';

    const scoreDisplay = e.score !== null ? `
      <div style="margin-top:4px">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:var(--text-secondary);margin-bottom:4px"><span>Confidence Score</span><span style="font-weight:700;color:${e.score>0.5?'var(--success)':'var(--error)'}">${(e.score*100).toFixed(0)}%</span></div>
        <div class="exp-score-bar" style="height:10px"><div class="exp-score-fill" style="width:${(e.score*100).toFixed(0)}%;background:${e.score>0.5?'var(--success)':'var(--error)'}"></div></div>
      </div>` : '';

    const checks = e.validations.map(v => `
      <div class="validation-check">
        <input type="checkbox" ${v.checked ? 'checked' : ''} onchange="toggleValidation('${id}','${v.label}',this.checked)" style="cursor:pointer">
        <span style="font-size:13px;color:${v.checked?'var(--text)':'var(--text-secondary)'}">${v.label}</span>
        ${v.checked ? '<span style="margin-left:auto;color:var(--success);font-size:12px">✓</span>' : '<span style="margin-left:auto;color:var(--text-tertiary);font-size:12px">○</span>'}
      </div>`).join('');

    document.getElementById('exp-detail-content').innerHTML = `
      <div class="panel" style="margin-bottom:12px">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:16px">
          <div>
            <div style="font-family:var(--font-mono);font-size:12px;color:var(--text-tertiary);margin-bottom:4px">${e.id}</div>
            <h2 style="font-size:16px;font-weight:700;line-height:1.4;color:var(--text)">${escHtml(e.hypothesis)}</h2>
          </div>
          <span class="exp-status-badge ${e.status}" style="flex-shrink:0">${capitalize(e.status)}</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
          <div>
            <div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;margin-bottom:4px">Method</div>
            <div style="font-size:13px;color:var(--text)">${escHtml(e.method||'—')}</div>
          </div>
          <div>
            <div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;margin-bottom:4px">Research Line</div>
            <div style="font-size:13px;color:var(--text)">${e.researchLine}</div>
          </div>
          <div>
            <div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;margin-bottom:4px">Success Criteria</div>
            <div style="font-size:13px;color:var(--success)">${escHtml(e.successCriteria||'—')}</div>
          </div>
          <div>
            <div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;margin-bottom:4px">Failure Criteria</div>
            <div style="font-size:13px;color:var(--error)">${escHtml(e.failureCriteria||'—')}</div>
          </div>
          <div>
            <div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;margin-bottom:4px">Expected Result</div>
            <div style="font-size:13px;color:var(--text)">${escHtml(e.expected||'—')}</div>
          </div>
          <div>
            <div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;margin-bottom:4px">Est. Compute Time</div>
            <div style="font-size:13px;color:var(--text)">${escHtml(e.computeTime||'—')}</div>
          </div>
        </div>
        ${scoreDisplay}
      </div>
      ${e.result ? `<div class="panel mb-2">
        <div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;margin-bottom:8px">Result</div>
        <div style="font-size:13px;line-height:1.6;color:var(--text)">${escHtml(e.result)}</div>
      </div>` : ''}
      <div class="panel">
        <div style="font-size:11px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;margin-bottom:8px">Validation Checklist</div>
        <div id="validation-list-${e.id.replace(/-/g,'_')}">${checks}</div>
      </div>`;
  };

  window.backToExpList = function() {
    document.getElementById('exp-detail-view').style.display = 'none';
    document.getElementById('exp-list-view').style.display = 'block';
  };

  window.toggleValidation = function(expId, label, val) {
    const e = allExperiments.find(x => x.id === expId);
    if (!e) return;
    const v = e.validations.find(v => v.label === label);
    if (v) v.checked = val;
  };

  // ---- Register Modal (T-063) ----
  window.showRegisterModal = function() {
    document.getElementById('register-modal').style.display = 'flex';
    document.getElementById('reg-hypothesis').focus();
  };
  window.closeRegisterModal = function() {
    document.getElementById('register-modal').style.display = 'none';
    document.getElementById('reg-alert').className = 'alert';
  };
  window.submitRegistration = async function() {
    const hyp = document.getElementById('reg-hypothesis').value.trim();
    const alertEl = document.getElementById('reg-alert');
    if (!hyp) { alertEl.textContent = 'Hypothesis is required'; alertEl.className = 'alert error show'; return; }

    const metadata = {
      method: document.getElementById('reg-method').value,
      expected: document.getElementById('reg-expected').value,
      researchLine: document.getElementById('reg-rl').value,
      successCriteria: document.getElementById('reg-success').value,
      failureCriteria: document.getElementById('reg-failure').value,
      computeTime: document.getElementById('reg-compute').value,
    };

    if (window.asrp) {
      const result = await window.asrp.experiments.register(hyp, metadata);
      if (result.success) {
        alertEl.textContent = `Registered: ${result.id}`;
        alertEl.className = 'alert success show';
        // Add to local list
        allExperiments.unshift({
          id: result.id, hypothesis: hyp, status: 'registered',
          created: new Date().toISOString().slice(0,10),
          score: null, result: null,
          researchLine: metadata.researchLine,
          computeTime: metadata.computeTime,
          method: metadata.method,
          expected: metadata.expected,
          successCriteria: metadata.successCriteria,
          failureCriteria: metadata.failureCriteria,
          validations: [
            { label: 'Hypothesis falsifiable', checked: true },
            { label: 'Method reproducible', checked: !!metadata.method },
            { label: 'Success criteria quantitative', checked: !!metadata.successCriteria },
            { label: 'Result recorded in registry', checked: false },
            { label: 'Linked to paper draft', checked: false },
          ],
        });
        setTimeout(() => { closeRegisterModal(); applyFilters(); }, 1200);
      }
    }
  };

  function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

  async function init() {
    if (!window.asrp) { allExperiments = MOCK_EXPERIMENTS; applyFilters(); return; }
    const { experiments } = await window.asrp.experiments.list();
    // Merge IPC data with extended mock (use mock for extended fields when IPC lacks them)
    allExperiments = experiments.map(e => {
      const mock = MOCK_EXPERIMENTS.find(m => m.id === e.id);
      return mock ? { ...mock, ...e } : { ...e, researchLine: 'RH', score: null, result: null, method: '', expected: '', successCriteria: '', failureCriteria: '', computeTime: '', validations: [] };
    });
    if (allExperiments.length === 0) allExperiments = MOCK_EXPERIMENTS;
    applyFilters();
  }

  init();
})();
</script>
