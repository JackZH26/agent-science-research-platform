appId: com.asrp.desktop
productName: ASRP Desktop
copyright: Copyright © 2026 Jian Zhou

directories:
  buildResources: build
  output: dist

files:
  - dist/main/**/*
  - dist/preload/**/*
  - src/renderer/**/*
  - resources/**/*
  - package.json

extraResources:
  - from: resources/
    to: resources/
    filter:
      - "**/*"

# Windows
win:
  target:
    - target: nsis
      arch: [x64]
  icon: build/icon.svg
  artifactName: ASRP_Setup_${version}.exe

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  deleteAppDataOnUninstall: false
  perMachine: false
  runAfterFinish: true

# macOS
mac:
  target:
    - target: dmg
      arch: [universal]
  icon: build/icon.svg
  category: public.app-category.productivity
  artifactName: ASRP_Setup_${version}.dmg

dmg:
  title: ASRP Desktop ${version}
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 190
      type: file
    - x: 410
      y: 190
      type: link
      path: /Applications

# Linux
linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: build/icon.svg
  category: Science
  description: Agent Science Research Platform Desktop Application
  maintainer: jackzhou.sci@gmail.com

appImage:
  artifactName: ASRP_Desktop_${version}.AppImage

# Auto-updater
publish:
  provider: github
  owner: JackZH26
  repo: agent-science-research-platform
  releaseType: draft
